      _initDateiDropzones() {
        const fileInputs = Array.from(document.querySelectorAll('input[type="file"]'));
        fileInputs.forEach((input) => this._bindDropzoneForFileInput(input));
      }

      _bindDropzoneForFileInput(input) {
        if (!(input instanceof HTMLInputElement)) {
          return;
        }

        const aktivieren = () => input.classList.add("drag-over");
        const deaktivieren = () => input.classList.remove("drag-over");

        input.addEventListener("dragenter", (event) => {
          event.preventDefault();
          aktivieren();
        });

        input.addEventListener("dragover", (event) => {
          event.preventDefault();
          aktivieren();
        });

        input.addEventListener("dragleave", (event) => {
          if (event.relatedTarget && input.contains(event.relatedTarget)) {
            return;
          }
          deaktivieren();
        });

        input.addEventListener("drop", (event) => {
          event.preventDefault();
          deaktivieren();
          const files = event.dataTransfer?.files;
          if (!files || !files.length) {
            return;
          }

          const transfer = new DataTransfer();
          const erlaubtMehrere = input.hasAttribute("multiple");
          const max = erlaubtMehrere ? files.length : 1;
          for (let i = 0; i < max; i += 1) {
            transfer.items.add(files[i]);
          }
          input.files = transfer.files;
          input.dispatchEvent(new Event("change", { bubbles: true }));
        });
      }

      async _handleProjektErstellen() {
        const formData = new FormData(this.elemente.projektFormular);
        const titel = String(formData.get("titel") || "").trim();

        try {
          if (this.bearbeiteProjektId) {
            const aktualisiertesProjekt = await this.storage.updateProjekt(this.bearbeiteProjektId, {
              titel,
            });

            this.elemente.formularFehler.textContent = "";
            await this._renderProjektliste();

            if (this.aktivesProjekt?.id === aktualisiertesProjekt.id) {
              await this._setAktivesProjekt(aktualisiertesProjekt.id);
            }

            this._schliesseNeueReiseDialog();
            return;
          }

          const neuesProjekt = await this.storage.createProjekt({ titel });

          this.elemente.formularFehler.textContent = "";
          this.elemente.projektFormular.reset();
          await this._renderProjektliste();
          await this._setAktivesProjekt(neuesProjekt.id);
          this._schliesseNeueReiseDialog();
          this._setStatus(`Projekt „${neuesProjekt.titel}“ gespeichert.`);
        } catch (error) {
          this.elemente.formularFehler.textContent = error.message || "Projekt konnte nicht gespeichert werden.";
          this._setStatus("Fehler beim Speichern.");
        }
      }

      async _handleProjektLoeschen(projektId) {
        const projekt = await this.storage.getProjekt(projektId);
        if (!projekt) {
          return;
        }

        const bestaetigt = window.confirm(`Projekt „${projekt.titel}“ wirklich löschen?`);
        if (!bestaetigt) {
          return;
        }

        await this.storage.deleteProjekt(projektId);

        if (this.aktivesProjekt?.id === projektId) {
          this.aktivesProjekt = null;
          this._zeigeLeeresProjekt();
        }

        await this._renderProjektliste();
        if (!this.aktivesProjekt) {
          this._oeffneEinstellungenDialog();
        }

        this._setStatus(`Projekt „${projekt.titel}“ gelöscht.`);
      }

      async _handleProjektDrucken(projektId) {
        const projekt = await this.storage.getProjekt(projektId);
        if (!projekt) {
          return;
        }

        const [timeline, kosten, dateien] = await Promise.all([
          this.storage.listTimelineEintraege(projektId),
          this.storage.getKostenStatistiken(projektId),
          this.storage.listDateienByProjekt(projektId),
        ]);

        const timelineRows = timeline.length
          ? timeline
            .map((eintrag) => {
              const zeit = formatZeitpunkt(eintrag.typ, eintrag.eintrag);
              return `<tr><td>${escapeHtml(badgeText(eintrag.typ))}</td><td>${escapeHtml(zeit)}</td><td>${escapeHtml(eintrag.titel)}</td><td>${escapeHtml(eintrag.untertitel || "-")}</td></tr>`;
            })
            .join("")
          : '<tr><td colspan="4">Keine Einträge</td></tr>';

        const kostenRows = kosten.anzahl
          ? `<tr><td>Gesamt</td><td>${escapeHtml(formatBetrag(kosten.gesamtEur || 0, "EUR"))}</td></tr>`
          : '<tr><td colspan="2">Keine Kosten</td></tr>';

        const dateiRows = dateien.length
          ? dateien.map((datei) => `<li>${escapeHtml(datei.name || "Datei")} (${escapeHtml(formatDateigroesse(datei.blob?.size || 0))})</li>`).join("")
          : "<li>Keine Dateien</li>";

        const html = `<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Druckansicht - ${escapeHtml(projekt.titel || "Reise")}</title>
  <style>
    body{font-family:Arial,sans-serif;color:#111827;margin:24px;}
    h1,h2{margin:0 0 10px;} h2{margin-top:24px;font-size:18px;}
    p.meta{margin:0 0 8px;color:#4b5563;}
    table{width:100%;border-collapse:collapse;margin-top:8px;}
    th,td{border:1px solid #d1d5db;padding:8px;text-align:left;font-size:13px;}
    th{background:#f3f4f6;}
    ul{margin:8px 0 0;padding-left:18px;}
    .eur{margin-top:8px;font-weight:700;}
    @media print { body { margin: 10mm; } }
  </style>
${"</he"+"ad>"}
<body>
  <h1>${escapeHtml(projekt.titel || "Reise")}</h1>
  <p class="meta">Exportiert am ${escapeHtml(formatDatumZeit(new Date().toISOString()))}</p>
  <h2>Zeitplan</h2>
  <table><thead><tr><th>Typ</th><th>Zeit</th><th>Name</th><th>Ort</th></tr></thead><tbody>${timelineRows}</tbody></table>
  <h2>Kosten</h2>
  <table><thead><tr><th>Typ</th><th>Summe</th></tr></thead><tbody>${kostenRows}</tbody></table>
  <p class="eur">Gesamtkosten: ${escapeHtml(formatBetrag(kosten.gesamtEur || 0, "EUR"))}</p>
  <h2>Dateien</h2>
  <ul>${dateiRows}</ul>
${"</bo"+"dy>"}
${"</ht"+"ml>"}
`;

        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const popup = window.open(url, "_blank", "width=1100,height=800");
        if (!popup) {
          this._setStatus("Druckansicht konnte nicht geöffnet werden (Popup blockiert).");
          URL.revokeObjectURL(url);
          return;
        }

        const cleanupUrl = () => {
          URL.revokeObjectURL(url);
        };

        popup.addEventListener("afterprint", cleanupUrl, { once: true });
        popup.addEventListener(
          "load",
          () => {
            popup.focus();
            popup.print();
            window.setTimeout(cleanupUrl, 2000);
          },
          { once: true },
        );
      }

      async _setAktivesProjekt(projektId) {
        const projekt = await this.storage.getProjekt(projektId);

        if (!projekt) {
          this._zeigeLeeresProjekt();
          return;
        }

        this.aktivesProjekt = projekt;
        this.aktiverHauptReiter = "timeline";
        this.bearbeiteEintrag = null;
        this.segmentProfileByKey = await this.storage.listSegmentProfileByProjekt(projekt.id);
        await this._renderProjektliste();
        await this._renderTimeline();
        this._aktualisiereHauptReiter();
        this.elemente.eintragFehler.textContent = "";
        this.elemente.ausgabeFehler.textContent = "";
        this.elemente.dateiFehler.textContent = "";
        void Promise.all([
          this._aktualisiereWaehrungsAuswahl(),
          this._renderKostenUebersicht(),
          this._renderDateiAblage(),
        ]).catch((error) => {
          console.warn("Projekt-Nebenbereiche konnten nicht vollständig vorgeladen werden.", error);
        });
      }

      async _handleEintragErstellen(formular) {
        if (!this.aktivesProjekt) {
          this.elemente.eintragFehler.textContent = "Bitte zuerst ein Projekt öffnen.";
          return;
        }

        const formData = new FormData(formular);
        const eintragTyp = this._getGewaehlterEintragTyp();
        if (!["aktivitaet", "unterkunft"].includes(eintragTyp)) {
          this.elemente.eintragFehler.textContent = "Bitte Eintragstyp wählen.";
          return;
        }
        const istBearbeiten = Boolean(this.bearbeiteEintrag);
        const vorherigerTyp = this.bearbeiteEintrag?.typ || "";

        try {
          const startZeit = combineDateAndTime(formData.get("startDate"), formData.get("startTime"));
          const endZeit = combineDateAndTime(formData.get("endDate"), formData.get("endTime"));
          const adresse = String(formData.get("adresse") || "").trim();
          const fehlendeAngaben = [];
          const startLabel = "Starttermin";
          const endLabel = "Endtermin";

          if (!startZeit) {
            fehlendeAngaben.push(startLabel);
          }
          if (!endZeit) {
            fehlendeAngaben.push(endLabel);
          }
          if (!adresse) {
            fehlendeAngaben.push("Adresse");
          }

          if (fehlendeAngaben.length) {
            const bestaetigt = window.confirm(
              `Es fehlen folgende Angaben: ${fehlendeAngaben.join(", ")}.\nTrotzdem speichern?`,
            );
            if (!bestaetigt) {
              return;
            }
          }

          if (eintragTyp === "unterkunft") {
            const payload = {
              projektId: this.aktivesProjekt.id,
              checkIn: startZeit,
              checkOut: endZeit,
              name: formData.get("name"),
              adresse,
              lat: formData.get("lat"),
              lon: formData.get("lon"),
              preis: formData.get("kosten"),
              waehrung: formData.get("waehrung"),
              notizen: formData.get("notizen"),
              link: formData.get("link"),
            };

            if (istBearbeiten) {
              await this.storage.updateUnterkunft(this.bearbeiteEintrag.id, payload);
              await this._speichereEintragDatei(formData, { typ: "unterkunft", id: this.bearbeiteEintrag.id });
            } else {
              const eintrag = await this.storage.createUnterkunft(payload);
              await this._speichereEintragDatei(formData, { typ: "unterkunft", id: eintrag.id });
            }
          } else {
            const payload = {
              projektId: this.aktivesProjekt.id,
              startZeit,
              endZeit,
              titel: formData.get("name"),
              ort: adresse,
              lat: formData.get("lat"),
              lon: formData.get("lon"),
              kosten: formData.get("kosten"),
              waehrung: formData.get("waehrung"),
              notizen: formData.get("notizen"),
              link: formData.get("link"),
            };

            if (istBearbeiten) {
              await this.storage.updateAktivitaet(this.bearbeiteEintrag.id, payload);
              await this._speichereEintragDatei(formData, { typ: "aktivitaet", id: this.bearbeiteEintrag.id });
            } else {
              const eintrag = await this.storage.createAktivitaet(payload);
              await this._speichereEintragDatei(formData, { typ: "aktivitaet", id: eintrag.id });
            }
          }

          if (istBearbeiten && vorherigerTyp && vorherigerTyp !== eintragTyp) {
            await this.storage.reassignDateienEintragTyp({
              projektId: this.aktivesProjekt.id,
              eintragId: this.bearbeiteEintrag.id,
              vonTyp: vorherigerTyp,
              nachTyp: eintragTyp,
            });
          }

          this.elemente.eintragFehler.textContent = "";
          formular.reset();
          this._beendeEintragBearbeiten();
          this._schliesseZeitplanDialog();
          await this._renderTimeline();
          await this._renderKarteRoute();
          await this._aktualisiereWaehrungsAuswahl();
          await this._renderKostenUebersicht();
          this._setStatus(istBearbeiten ? "Eintrag aktualisiert." : "Eintrag gespeichert.");
        } catch (error) {
          this.elemente.eintragFehler.textContent = error.message || "Eintrag konnte nicht gespeichert werden.";
          this._setStatus("Fehler beim Speichern des Eintrags.");
        }
      }

      async _renderProjektliste() {
        const projekte = await this.storage.listProjekte();
        const neueReiseEintrag = `
      <li class="neue-reise-eintrag">
        <button type="button" class="plus-reise-knopf" data-action="neu" aria-label="Neue Reise erstellen">
          <span aria-hidden="true">➕</span>
        </button>
      </li>
    `;

        if (!projekte.length) {
          this.elemente.projekteListe.innerHTML = neueReiseEintrag;
          return;
        }

        this.elemente.projekteListe.innerHTML =
          projekte
            .map((projekt) => {
              const aktivKlasse = this.aktivesProjekt?.id === projekt.id ? "aktiv-projekt" : "";

              return `
            <li class="listen-eintrag projekt-kachel ${aktivKlasse}" data-action="oeffnen" data-projekt-id="${projekt.id}" role="button" tabindex="0" aria-label="Reise öffnen: ${escapeHtml(projekt.titel)}">
              <h3>${escapeHtml(projekt.titel)}</h3>
              <div class="listen-aktionen">
                <button type="button" class="sekundaer" data-action="drucken" data-projekt-id="${projekt.id}" aria-label="Drucken" title="Drucken">🖨️</button>
                <button type="button" class="sekundaer" data-action="bearbeiten" data-projekt-id="${projekt.id}" aria-label="Bearbeiten" title="Bearbeiten">✏️</button>
                <button type="button" class="gefahr" data-action="loeschen" data-projekt-id="${projekt.id}" aria-label="Löschen" title="Löschen">🗑️</button>
              </div>
            </li>
          `;
            })
            .join("") +
          neueReiseEintrag;
      }

      _zeigeLeeresProjekt() {
        this._beendeEintragBearbeiten();
        this._aktualisiereHauptReiter();
        this.segmentProfileByKey = {};
        this._resetTimelineBildVorschauen();
        this.elemente.timelineListe.innerHTML = "";
        this.elemente.karteDistanz.textContent = "Gesamtstrecke: -";
        this.elemente.karteHinweis.textContent = "";
        this.elemente.kostenGesamtListe.innerHTML = "";
        this.elemente.kostenKategorieListe.innerHTML = "";
        this.elemente.kostenTagListe.innerHTML = "";
        this._setAktiverKostenTab(this.aktiverKostenTab);
        this.elemente.dateienListe.innerHTML = "";
        this.map?.clear();
      }

      async _renderTimeline({ prefetchInternetBilder = true } = {}) {
        if (!this.aktivesProjekt) {
          this._zeigeLeeresProjekt();
          return;
        }
        const renderId = this.timelineRenderId + 1;
        this.timelineRenderId = renderId;

        this._resetTimelineBildVorschauen();
        const projektId = this.aktivesProjekt.id;
        const eintraege = await this.storage.listTimelineEintraege(projektId);
        const plusEintrag = `
      <li class="timeline-plus-eintrag">
        <button type="button" class="plus-reise-knopf timeline-plus-knopf" data-timeline-add="1" aria-label="Eintrag hinzufügen">
          <span aria-hidden="true">➕</span>
        </button>
      </li>
    `;

        if (!eintraege.length) {
          this.elemente.timelineListe.innerHTML = `<li class="timeline-leer">Noch kein Zeitplan vorhanden.</li>${plusEintrag}`;
          return;
        }

        const eintraegeMitBild = await Promise.all(
          eintraege.map(async (eintrag) => {
            const anhaenge = Array.isArray(eintrag.anhaenge) ? eintrag.anhaenge : [];
            const bildVorschau = await this._buildTimelineBildVorschau(eintrag, anhaenge, { allowNetwork: false });
            return { eintrag, anhaenge, bildVorschau };
          }),
        );

        const timelineKey = (eintrag) => `${eintrag.typ}:${eintrag?.eintrag?.id || ""}`;
        const segmentKey = (fromEintrag, toEintrag) => `${timelineKey(fromEintrag)}->${timelineKey(toEintrag)}`;
        let listHtml = "";
        for (let index = 0; index < eintraegeMitBild.length; index += 1) {
            const { eintrag, anhaenge, bildVorschau } = eintraegeMitBild[index];
            const badge = badgeText(eintrag.typ);
            const badgeClass = `badge-${eintrag.typ}`;
            const zeiten = formatZeitZeilen(eintrag.typ, eintrag.eintrag);
            const detailsHtml = eintrag.details ? `<p class="timeline-details">${escapeHtml(eintrag.details)}</p>` : "";
            const linkUrl = normalizeExternalLink(eintrag?.eintrag?.link);
            const linkHtml = linkUrl
              ? `<p class="timeline-meta timeline-meta-zeile"><span class="timeline-meta-symbol" aria-hidden="true">🔗</span><a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">Öffnen</a></p>`
              : "";
            const dateienHtml = anhaenge.length
              ? `<div class="timeline-dateien">${anhaenge
                .map((datei) => {
                  const name = escapeHtml(datei.name || "Datei öffnen");
                  return `<div class="timeline-datei-zeile"><button type="button" class="sekundaer timeline-datei-btn" data-timeline-datei-action="oeffnen" data-datei-id="${datei.id}">${name}</button><button type="button" class="gefahr timeline-datei-loeschen" data-timeline-datei-action="loeschen" data-datei-id="${datei.id}" aria-label="Datei löschen" title="Datei löschen">🗑️</button></div>`;
                })
                .join("")}</div>`
              : "";
            const bildVorschauHtml = bildVorschau
              ? `<div class="timeline-bild-vorschau-wrap"><img class="timeline-bild-vorschau" src="${escapeHtml(bildVorschau.src)}" alt="${escapeHtml(bildVorschau.alt)}" loading="lazy" decoding="async"${bildVorschau.isInternet ? ' referrerpolicy="no-referrer"' : ""}></div>`
              : "";
            const eintragBildKlasse = bildVorschau ? " timeline-eintrag-mit-bild" : "";
            const isEintrag = eintrag.typ === "aktivitaet" || eintrag.typ === "unterkunft";
            const aktionenHtml = isEintrag
              ? `<div class="timeline-aktionen"><button type="button" class="sekundaer timeline-bearbeiten" data-timeline-action="bearbeiten" data-timeline-typ="${eintrag.typ}" data-timeline-id="${eintrag.eintrag.id}" aria-label="Bearbeiten" title="Bearbeiten">✏️</button></div>`
              : "";
            const ortHtml = isEintrag
              ? `<button type="button" class="timeline-ort-link" data-timeline-ort-action="karte" data-timeline-typ="${eintrag.typ}" data-timeline-id="${eintrag.eintrag.id}">${escapeHtml(eintrag.untertitel || "-")}</button>`
              : `<span>${escapeHtml(eintrag.untertitel || "-")}</span>`;

            const datenHtml = `<div class="timeline-daten"><div class="timeline-zeiten"><p class="timeline-zeitzeile"><span class="timeline-zeit-symbol" aria-hidden="true">🟢</span><span class="timeline-zeit-label">${escapeHtml(zeiten.startLabel)}:</span><span>${escapeHtml(zeiten.start)}</span></p><p class="timeline-zeitzeile"><span class="timeline-zeit-symbol" aria-hidden="true">🔴</span><span class="timeline-zeit-label">${escapeHtml(zeiten.endeLabel)}:</span><span>${escapeHtml(zeiten.ende)}</span></p></div><p class="timeline-meta timeline-meta-zeile"><span class="timeline-meta-symbol" aria-hidden="true">📍</span>${ortHtml}</p>${linkHtml}${detailsHtml}${dateienHtml}</div>`;
            listHtml += `<li class="timeline-eintrag timeline-typ-${eintrag.typ}${eintragBildKlasse}" style="animation-delay:${index * 36}ms"><div class="timeline-zeile"><div class="timeline-kopf"><div class="timeline-kopf-links"><h4>${escapeHtml(eintrag.titel)}</h4><span class="badge ${badgeClass}">${badge}</span></div><div class="timeline-kopf-rechts">${aktionenHtml}</div></div><div class="timeline-inhalt">${bildVorschauHtml}${datenHtml}</div></div></li>`;

            const nextEintrag = eintraege[index + 1];
            const hasCurrentAndNext = isEintrag
              && (nextEintrag?.typ === "aktivitaet" || nextEintrag?.typ === "unterkunft");
            if (hasCurrentAndNext) {
              const key = segmentKey(eintrag, nextEintrag);
              const activeProfile = normalizeProfile(this.segmentProfileByKey[key] || PROFILE_DEFAULT);
              listHtml += `<li class="timeline-segment-steuerung"><div class="timeline-segment-inhalt"><button type="button" class="timeline-segment-btn ${activeProfile === "driving" ? "aktiv" : ""}" data-segment-key="${escapeHtml(key)}" data-segment-profile="driving" aria-label="Auto" title="Auto">🚗</button><div class="timeline-segment-pfeil" aria-hidden="true"></div><button type="button" class="timeline-segment-btn ${activeProfile === "walking" ? "aktiv" : ""}" data-segment-key="${escapeHtml(key)}" data-segment-profile="walking" aria-label="Zu Fuß" title="Zu Fuß">🚶</button></div></li>`;
            }
          }

        this.elemente.timelineListe.innerHTML = `${listHtml}${plusEintrag}`;
        this._syncTimelineBildFallbacks();
        if (prefetchInternetBilder) {
          void this._prefetchTimelineInternetBilder(eintraege, { projektId, renderId });
        }
      }

      _syncTimelineBildFallbacks() {
        const bilder = Array.from(this.elemente?.timelineListe?.querySelectorAll(".timeline-bild-vorschau") || []);
        bilder.forEach((img) => {
          const removeBroken = (reason = "error-event") => {
            void this._logBildLadefehler(img, reason);
            const wrap = img.closest(".timeline-bild-vorschau-wrap");
            if (wrap) {
              wrap.remove();
            }
            const eintrag = img.closest(".timeline-eintrag");
            if (eintrag) {
              eintrag.classList.remove("timeline-eintrag-mit-bild");
            }
          };

          if (img.complete && (!Number.isFinite(img.naturalWidth) || img.naturalWidth <= 0)) {
            removeBroken("complete-without-dimensions");
            return;
          }

          img.addEventListener("error", () => removeBroken("img-error-event"), { once: true });
        });
      }

      async _logBildLadefehler(img, reason = "unknown") {
        try {
          const src = String(img?.currentSrc || img?.src || "").trim();
          const titel = String(img?.closest(".timeline-eintrag")?.querySelector(".timeline-kopf-links h4")?.textContent || "").trim();
          if (!src) {
            console.warn("[Bildfehler] Keine src vorhanden.", { reason, titel });
            return;
          }

          const info = { reason, titel, src };
          if (src.startsWith("blob:") || src.startsWith("data:")) {
            console.warn("[Bildfehler] Lokale Bildquelle konnte nicht geladen werden.", info);
            return;
          }

          try {
            const response = await fetch(src, {
              method: "HEAD",
              cache: "no-store",
              mode: "cors",
            });
            console.warn("[Bildfehler] HTTP-Probe", {
              ...info,
              status: response.status,
              ok: response.ok,
              contentType: response.headers.get("content-type") || "",
            });
          } catch (fetchError) {
            const message = fetchError instanceof Error ? fetchError.message : String(fetchError || "");
            console.warn("[Bildfehler] Fetch-Probe fehlgeschlagen (oft CORS/Netzwerk/Hotlink-Sperre).", {
              ...info,
              fetchError: message,
            });
          }
        } catch {
        }
      }

      _resetTimelineBildVorschauen() {
        this.timelineBildVorschauUrls.forEach((url) => {
          try {
            URL.revokeObjectURL(url);
          } catch {
          }
        });
        this.timelineBildVorschauUrls = [];
      }

      _isImageDatei(datei) {
        const typ = String(datei?.typ || datei?.blob?.type || "").toLowerCase();
        return typ.startsWith("image/");
      }

      _createBildBlobUrl(datei) {
        if (!datei) {
          return "";
        }
        const blob = datei.blob instanceof Blob
          ? datei.blob
          : (datei.blob ? new Blob([datei.blob], { type: datei.typ || "application/octet-stream" }) : null);
        if (!(blob instanceof Blob) || blob.size <= 0) {
          return "";
        }
        const url = URL.createObjectURL(blob);
        this.timelineBildVorschauUrls.push(url);
        return url;
      }

      async _findInternetBildUrl(eintrag, anhaenge, { allowNetwork = true } = {}) {
        if (Array.isArray(anhaenge) && anhaenge.some((datei) => this._isImageDatei(datei))) {
          return "";
        }

        const query = String(eintrag?.titel || "").trim().slice(0, 120);
        if (!query) {
          return "";
        }

        const cacheKey = query.toLowerCase();
        if (this.internetBildCache.has(cacheKey)) {
          const cachedValue = this.internetBildCache.get(cacheKey) || "";
          if (cachedValue.includes("source.unsplash.com")) {
            this.internetBildCache.delete(cacheKey);
          } else if (cachedValue) {
            return cachedValue;
          }
        }

        try {
          const persisted = await this.storage.getInternetBildCache(cacheKey);
          if (persisted) {
            const persistedUrl = String(persisted.url || "");
            this.internetBildCache.set(cacheKey, persistedUrl);
            return persistedUrl;
          }
        } catch {
        }

        if (!allowNetwork) {
          return "";
        }

        try {
          const commonsUrl = `https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&gsrlimit=5&prop=imageinfo&iiprop=url&iiurlwidth=420&iiurlheight=260`;
          try {
            const commonsResponse = await fetch(commonsUrl);
            if (commonsResponse.ok) {
              const commonsPayload = await commonsResponse.json();
              const commonsPages = commonsPayload?.query?.pages ? Object.values(commonsPayload.query.pages) : [];
              const commonsPage = commonsPages.find((page) => {
                const info = Array.isArray(page?.imageinfo) ? page.imageinfo[0] : null;
                return typeof info?.thumburl === "string" || typeof info?.url === "string";
              });
              const commonsInfo = Array.isArray(commonsPage?.imageinfo) ? commonsPage.imageinfo[0] : null;
              const commonsBildUrl = String(commonsInfo?.thumburl || commonsInfo?.url || "");
              if (commonsBildUrl) {
                this.internetBildCache.set(cacheKey, commonsBildUrl);
                try {
                  await this.storage.setInternetBildCache({ query: cacheKey, url: commonsBildUrl, source: "wikimedia-commons" });
                } catch {
                }
                return commonsBildUrl;
              }
            }
          } catch {
          }

          for (const lang of WIKIPEDIA_BILD_LANGS) {
            const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=320`;
            try {
              const response = await fetch(url);
              if (!response.ok) {
                continue;
              }
              const payload = await response.json();
              const pages = payload?.query?.pages ? Object.values(payload.query.pages) : [];
              const first = pages.find((page) => typeof page?.thumbnail?.source === "string");
              const bildUrl = String(first?.thumbnail?.source || "");
              if (!bildUrl) {
                continue;
              }
              this.internetBildCache.set(cacheKey, bildUrl);
              try {
                await this.storage.setInternetBildCache({ query: cacheKey, url: bildUrl, source: `wikipedia-${lang}` });
              } catch {
              }
              return bildUrl;
            } catch {
            }
          }
          return "";
        } catch {
          return "";
        }
      }

      async _buildTimelineBildVorschau(eintrag, anhaenge, { allowNetwork = true } = {}) {
        const bildDatei = Array.isArray(anhaenge) ? anhaenge.find((datei) => this._isImageDatei(datei)) : null;
        if (bildDatei) {
          const localUrl = this._createBildBlobUrl(bildDatei);
          if (!localUrl) {
            return null;
          }
          return {
            src: localUrl,
            alt: eintrag?.titel || "Bild",
            isInternet: false,
          };
        }

        const internetUrl = await this._findInternetBildUrl(eintrag, anhaenge, { allowNetwork });
        if (!internetUrl) {
          return null;
        }
        return {
          src: internetUrl,
          alt: eintrag?.titel || "Bild aus dem Internet",
          isInternet: true,
        };
      }

      async _prefetchTimelineInternetBilder(eintraege, { projektId, renderId }) {
        if (!this.aktivesProjekt || this.aktivesProjekt.id !== projektId) {
          return;
        }

        let changed = false;
        for (const eintrag of eintraege) {
          if (!this.aktivesProjekt || this.aktivesProjekt.id !== projektId || this.timelineRenderId !== renderId) {
            return;
          }
          const anhaenge = Array.isArray(eintrag?.anhaenge) ? eintrag.anhaenge : [];
          const hasBildAnhang = anhaenge.some((datei) => this._isImageDatei(datei));
          if (hasBildAnhang) {
            continue;
          }

          const query = String(eintrag?.titel || "").trim().slice(0, 120).toLowerCase();
          const hadCache = query ? Boolean(this.internetBildCache.get(query)) : false;
          const url = await this._findInternetBildUrl(eintrag, anhaenge, { allowNetwork: true });
          if (url && !hadCache) {
            changed = true;
          }
        }

        if (!changed) {
          return;
        }
        if (!this.aktivesProjekt || this.aktivesProjekt.id !== projektId || this.timelineRenderId !== renderId) {
          return;
        }

        await this._renderTimeline({ prefetchInternetBilder: false });
      }

      async _renderKarteRoute() {
        if (!this.aktivesProjekt) {
          return;
        }
        if (this.aktiverHauptReiter !== "karte") {
          return;
        }

        if (!this.map) {
          this.elemente.karteHinweis.textContent = "Kartenmodul nicht verfügbar.";
          return;
        }

        const [unterkuenfte, aktivitaeten] = await Promise.all([
          this.storage.listUnterkuenfteByProjekt(this.aktivesProjekt.id),
          this.storage.listAktivitaetenByProjekt(this.aktivesProjekt.id),
        ]);
        const resolved = await this.storage.resolveKoordinatenFuerProjekt({ unterkuenfte, aktivitaeten });
        const result = await this.map.renderStops(
          [],
          resolved.unterkuenfte,
          resolved.aktivitaeten,
          PROFILE_DEFAULT,
          this.segmentProfileByKey,
          { showSegmentLabels: this.zeigeSegmentSprechblasen },
        );

        if (result.markerCount >= 2) {
          this.elemente.karteDistanz.textContent = `Gesamtstrecke: ${formatDistanzKm(result.distanceKm)}`;
        } else {
          this.elemente.karteDistanz.textContent = "Gesamtstrecke: -";
        }

        if (!result.mapReady) {
          this.elemente.karteHinweis.textContent =
            "Leaflet konnte nicht geladen werden. Die App bleibt offline nutzbar, die Karte benötigt Internet oder lokale Leaflet-Dateien.";
          return;
        }

        this.elemente.karteHinweis.textContent =
          result.routeType === "fallback"
            ? `Gesamtstrecke (${profilLabel(result.profile)}) aktuell nicht erreichbar, zeige Luftlinie mit geschätzter Dauer je Abschnitt.`
            : "";

        if (this.kartenFokus && Date.now() < this.kartenFokus.bis) {
          this.map.focusOn(this.kartenFokus.lat, this.kartenFokus.lon, this.kartenFokus.zoom);
        } else if (this.kartenFokus && Date.now() >= this.kartenFokus.bis) {
          this.kartenFokus = null;
        }

        window.requestAnimationFrame(() => this.map.invalidateSize());
      }

      _setAktiverKostenTab(tabName) {
        void tabName;
        this.aktiverKostenTab = "kategorie";
        if (this.elemente.kostenKategorieBereich) {
          this.elemente.kostenKategorieBereich.hidden = false;
        }
        if (this.elemente.kostenTagBereich) {
          this.elemente.kostenTagBereich.hidden = false;
        }
      }

      async _handleAusgabeErstellen() {
        if (!this.aktivesProjekt) {
          this.elemente.ausgabeFehler.textContent = "Bitte zuerst ein Projekt öffnen.";
          return;
        }

        const formData = new FormData(this.elemente.ausgabeForm);

        try {
          const ausgabe = await this.storage.createAusgabe({
            projektId: this.aktivesProjekt.id,
            datum: formData.get("datum"),
            betrag: formData.get("betrag"),
            waehrung: formData.get("waehrung"),
            kategorie: formData.get("kategorie"),
            titel: formData.get("titel"),
            notizen: formData.get("notizen"),
          });
          await this._speichereEintragDatei(formData, { typ: "ausgabe", id: ausgabe.id });

          this.elemente.ausgabeFehler.textContent = "";
          this.elemente.ausgabeForm.reset();
          this.elemente.ausgabeForm.querySelector("#ausgabe-waehrung").value = "EUR";
          this._schliesseKostenDialog();
          await this._renderKostenUebersicht();
          this._setStatus("Ausgabe gespeichert.");
        } catch (error) {
          this.elemente.ausgabeFehler.textContent = error.message || "Ausgabe konnte nicht gespeichert werden.";
          this._setStatus("Fehler beim Speichern der Ausgabe.");
        }
      }

      async _speichereEintragDatei(formData, { typ, id }) {
        const datei = formData.get("datei");
        if (!(datei instanceof File) || datei.size <= 0) {
          return;
        }

        await this.storage.createDatei({
          projektId: this.aktivesProjekt.id,
          datei,
          eintragTyp: typ,
          eintragId: id,
        });
      }

      async _renderKostenUebersicht() {
        if (!this.aktivesProjekt) {
          return;
        }

        const statistik = await this.storage.getKostenStatistiken(this.aktivesProjekt.id);

        if (!statistik.anzahl) {
          this.elemente.kostenGesamtListe.innerHTML = '<li class="timeline-leer">Noch keine Kosten vorhanden.</li>';
          this.elemente.kostenKategorieListe.innerHTML = '<p class="timeline-leer">Noch keine Kategorien vorhanden.</p>';
          this.elemente.kostenTagListe.innerHTML = '<p class="timeline-leer">Noch keine Tageswerte vorhanden.</p>';
          return;
        }

        this.elemente.kostenGesamtListe.innerHTML = "";

        const gesamtEurZeile = `
      <li class="kennzahl-zeile kennzahl-zeile-wert-only">
        <span class="kennzahl-wert">${escapeHtml(formatBetrag(statistik.gesamtEur || 0, "EUR"))}</span>
      </li>
    `;
        this.elemente.kostenGesamtListe.insertAdjacentHTML("beforeend", gesamtEurZeile);
        if (statistik.hatUmrechnungsfehler) {
          this.elemente.kostenGesamtListe.insertAdjacentHTML(
            "beforeend",
            '<li class="kennzahl-zeile"><span class="kennzahl-label">Hinweis</span><span class="kennzahl-wert">Einzelne Kurse fehlten</span></li>',
          );
        }

        this.elemente.kostenKategorieListe.innerHTML = `
      <ul class="kennzahlen-liste">
        ${statistik.proKategorieGesamt.length
            ? statistik.proKategorieGesamt
              .map(
                (eintrag) => `
                    <li class="kennzahl-zeile">
                      <span class="kennzahl-label">${escapeHtml(eintrag.name)}</span>
                      <span class="kennzahl-wert">${escapeHtml(formatBetrag(eintrag.summe, "EUR"))}</span>
                    </li>
                  `,
              )
              .join("")
            : '<li class="kennzahl-zeile"><span class="kennzahl-label">Keine Daten</span><span class="kennzahl-wert">-</span></li>'
          }
      </ul>
    `;

        this.elemente.kostenTagListe.innerHTML = `
      <ul class="kennzahlen-liste">
        ${statistik.proTagGesamt.length
            ? statistik.proTagGesamt
              .map(
                (eintrag) => `
                    <li class="kennzahl-zeile">
                      <span class="kennzahl-label">${escapeHtml(formatTag(eintrag.tag))}</span>
                      <span class="kennzahl-wert">${escapeHtml(formatBetrag(eintrag.summe, "EUR"))}</span>
                    </li>
                  `,
              )
              .join("")
            : '<li class="kennzahl-zeile"><span class="kennzahl-label">Keine Daten</span><span class="kennzahl-wert">-</span></li>'
          }
      </ul>
    `;
        this._setAktiverKostenTab(this.aktiverKostenTab);
      }

      async _handleJsonExport() {
        try {
          const backup = await this.storage.exportJsonBackup();
          const backupText = JSON.stringify(backup, null, 2);
          const blob = new Blob([backupText], { type: "application/json;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const zeitstempel = new Date().toISOString().replaceAll(":", "-").slice(0, 19);
          const link = document.createElement("a");
          link.href = url;
          link.download = `reiseplaner-datenbank-export-${zeitstempel}.json`;
          link.click();
          window.setTimeout(() => URL.revokeObjectURL(url), 30_000);
          this.elemente.jsonFehler.textContent = "";
          this._setStatus("Datenbank exportiert.");
        } catch (error) {
          this.elemente.jsonFehler.textContent = error.message || "Datenbank konnte nicht exportiert werden.";
          this._setStatus("Fehler beim Datenbank-Export.");
        }
      }

      async _handleJsonImport() {
        const datei = this.elemente.jsonImportInput?.files?.[0];
        if (!datei) {
          this.elemente.jsonFehler.textContent = "Bitte eine Datenbank-Datei auswählen.";
          return;
        }

        const bestaetigt = window.confirm("Beim Import werden vorhandene Daten überschrieben. Fortfahren?");
        if (!bestaetigt) {
          if (this.elemente.jsonImportInput) {
            this.elemente.jsonImportInput.value = "";
          }
          return;
        }

        try {
          const text = await datei.text();
          const payload = JSON.parse(text);
          const vorherAktivesProjektId = this.aktivesProjekt?.id || "";
          await this.storage.importJsonBackup(payload);
          this.importierteDatenbankDatei = String(datei.name || "").trim();
          this._renderDatenbankAnzeige();
          if (this.elemente.jsonImportInput) {
            this.elemente.jsonImportInput.value = "";
          }
          this.elemente.jsonFehler.textContent = "";
          this.bearbeiteEintrag = null;
          this.bearbeiteProjektId = null;

          await this._renderProjektliste();
          if (vorherAktivesProjektId) {
            const projekt = await this.storage.getProjekt(vorherAktivesProjektId);
            if (projekt) {
              await this._setAktivesProjekt(vorherAktivesProjektId);
              this._setStatus("Datenbank importiert.");
              return;
            }
          }

          const projekte = await this.storage.listProjekte();
          if (projekte.length) {
            await this._setAktivesProjekt(projekte[0].id);
          } else {
            this.aktivesProjekt = null;
            this._zeigeLeeresProjekt();
          }

          this._setStatus("Datenbank importiert.");
        } catch (error) {
          this.elemente.jsonFehler.textContent = error.message || "Datenbank konnte nicht importiert werden.";
          if (this.elemente.jsonImportInput) {
            this.elemente.jsonImportInput.value = "";
          }
          this._setStatus("Fehler beim Datenbank-Import.");
        }
      }

      async _handleDateiImport() {
        if (!this.aktivesProjekt) {
          this.elemente.dateiFehler.textContent = "Bitte zuerst ein Projekt öffnen.";
          return;
        }

        const dateien = Array.from(this.elemente.dateienInput.files || []);
        if (!dateien.length) {
          this.elemente.dateiFehler.textContent = "Bitte mindestens eine Datei auswählen.";
          return;
        }

        try {
          await Promise.all(dateien.map((datei) => this.storage.createDatei({ projektId: this.aktivesProjekt.id, datei })));
          this.elemente.dateiFehler.textContent = "";
          this.elemente.dateiForm.reset();
          await this._renderDateiAblage();
          this._setStatus(`${dateien.length} Datei(en) importiert.`);
        } catch (error) {
          this.elemente.dateiFehler.textContent = error.message || "Datei konnte nicht importiert werden.";
          this._setStatus("Fehler beim Dateiimport.");
        }
      }

      async _handleDateiOeffnen(dateiId) {
        const dateiEintrag = await this.storage.getDatei(dateiId);
        if (!dateiEintrag?.blob) {
          this._setStatus("Datei nicht gefunden.");
          return;
        }

        const blob = dateiEintrag.blob instanceof Blob ? dateiEintrag.blob : new Blob([dateiEintrag.blob], { type: dateiEintrag.typ });
        const url = URL.createObjectURL(blob);
        const popup = window.open(url, "_blank", "noopener");

        if (!popup) {
          const link = document.createElement("a");
          link.href = url;
          link.download = dateiEintrag.name || "datei";
          link.click();
        }

        setTimeout(() => URL.revokeObjectURL(url), 60_000);
        this._setStatus(`Datei „${dateiEintrag.name}“ geöffnet.`);
      }

      async _handleDateiLoeschen(dateiId) {
        const dateiEintrag = await this.storage.getDatei(dateiId);
        if (!dateiEintrag) {
          return;
        }

        const bestaetigt = window.confirm(`Datei „${dateiEintrag.name}“ wirklich löschen?`);
        if (!bestaetigt) {
          return;
        }

        await this.storage.deleteDatei(dateiId);
        await this._renderDateiAblage();
        this._setStatus(`Datei „${dateiEintrag.name}“ gelöscht.`);
      }

      async _renderDateiAblage() {
        if (!this.aktivesProjekt) {
          return;
        }

        const dateien = await this.storage.listDateienByProjekt(this.aktivesProjekt.id);

        if (!dateien.length) {
          this.elemente.dateienListe.innerHTML = '<li class="timeline-leer">Noch keine Dateien gespeichert.</li>';
          return;
        }

        this.elemente.dateienListe.innerHTML = dateien
          .map(
            (datei) => `
          <li class="listen-eintrag">
            <p class="datei-name">${escapeHtml(datei.name || "Datei")}</p>
            <p class="datei-meta">${escapeHtml(datei.typ || "Unbekannter Typ")} · ${escapeHtml(formatDateigroesse(datei.blob?.size || 0))} · ${escapeHtml(formatDatumZeit(datei.erstelltAm || ""))}</p>
            <div class="listen-aktionen">
              <button type="button" data-datei-action="oeffnen" data-datei-id="${datei.id}">Öffnen</button>
              <button type="button" class="gefahr" data-datei-action="loeschen" data-datei-id="${datei.id}" aria-label="Löschen" title="Löschen">🗑️</button>
            </div>
          </li>
        `,
          )
          .join("");
      }

      _aktualisiereEintragTypTabs() {
        const typ = this._getGewaehlterEintragTyp();
        const istUnterkunft = typ === "unterkunft";

        if (this.elemente.eintragStartDateLabel) {
          this.elemente.eintragStartDateLabel.textContent = "Start Datum";
        }
        if (this.elemente.eintragStartTimeLabel) {
          this.elemente.eintragStartTimeLabel.textContent = "Start Uhrzeit";
        }
        if (this.elemente.eintragEndDateLabel) {
          this.elemente.eintragEndDateLabel.textContent = "Ende Datum";
        }
        if (this.elemente.eintragEndTimeLabel) {
          this.elemente.eintragEndTimeLabel.textContent = "Ende Uhrzeit";
        }
        if (this.elemente.eintragNameLabel) {
          this.elemente.eintragNameLabel.textContent = "Titel";
        }
        if (this.elemente.eintragAdresseLabel) {
          this.elemente.eintragAdresseLabel.textContent = "Ort / Adresse";
        }
        if (this.elemente.eintragKostenLabel) {
          this.elemente.eintragKostenLabel.textContent = "Kosten";
        }
        this._setEintragTypValue(typ);
        this.elemente.eintragTypButtons.forEach((button) => {
          const buttonTyp = String(button.dataset.eintragTyp || "").trim();
          const aktiv = buttonTyp === typ;
          button.classList.toggle("aktiv", aktiv);
          button.setAttribute("aria-pressed", String(aktiv));
          button.disabled = false;
        });
        this.elemente.eintragForm?.classList.toggle("eintrag-form-aktivitaet", typ === "aktivitaet");
        this.elemente.eintragForm?.classList.toggle("eintrag-form-unterkunft", typ === "unterkunft");

        if (this.elemente.eintragSubmitBtn) {
          this.elemente.eintragSubmitBtn.textContent = "💾";
          this.elemente.eintragSubmitBtn.setAttribute("aria-label", "Item speichern");
          this.elemente.eintragSubmitBtn.setAttribute("title", "Item speichern");
        }
      }

      _getGewaehlterEintragTyp() {
        const value = String(this.elemente.eintragTypInput?.value || "").trim();
        return ["aktivitaet", "unterkunft"].includes(value) ? value : "aktivitaet";
      }

      _setEintragTypValue(typ) {
        const normalized = ["aktivitaet", "unterkunft"].includes(typ) ? typ : "aktivitaet";
        if (this.elemente.eintragTypInput) {
          this.elemente.eintragTypInput.value = normalized;
        }
      }

      async _starteEintragBearbeiten(typ, eintragId) {
        if (!this.aktivesProjekt || !eintragId) {
          return;
        }

        if (typ === "aktivitaet") {
          const aktivitaet = await this.storage.getAktivitaet(eintragId);
          if (!aktivitaet || aktivitaet.projektId !== this.aktivesProjekt.id) {
            return;
          }

          this._oeffneZeitplanDialog();
          const start = splitDateAndTime(aktivitaet.startZeit);
          const ende = splitDateAndTime(aktivitaet.endZeit);
          this.elemente.eintragForm.querySelector("#eintrag-startDate").value = start.date;
          this.elemente.eintragForm.querySelector("#eintrag-startTime").value = start.time;
          this.elemente.eintragForm.querySelector("#eintrag-endDate").value = ende.date;
          this.elemente.eintragForm.querySelector("#eintrag-endTime").value = ende.time;
          this.elemente.eintragForm.querySelector("#eintrag-name").value = aktivitaet.titel || "";
          this.elemente.eintragForm.querySelector("#eintrag-adresse").value = aktivitaet.ort || "";
          this.elemente.eintragForm.querySelector("#eintrag-kosten").value = aktivitaet.kosten ?? "";
          this.elemente.eintragForm.querySelector("#eintrag-waehrung").value = aktivitaet.waehrung || "EUR";
          this.elemente.eintragForm.querySelector("#eintrag-link").value = aktivitaet.link || "";
          this.elemente.eintragForm.querySelector("#eintrag-notizen").value = aktivitaet.notizen || "";
          this.bearbeiteEintrag = { typ, id: eintragId };
          this._setEintragTypValue("aktivitaet");
          this._aktualisiereEintragTypTabs();
          if (this.elemente.eintragLoeschenBtn) {
            this.elemente.eintragLoeschenBtn.hidden = false;
          }
          this.elemente.eintragForm.querySelector("#eintrag-name")?.focus();
          return;
        }

        if (typ === "unterkunft") {
          const unterkunft = await this.storage.getUnterkunft(eintragId);
          if (!unterkunft || unterkunft.projektId !== this.aktivesProjekt.id) {
            return;
          }

          this._oeffneZeitplanDialog();
          const checkIn = splitDateAndTime(unterkunft.checkIn);
          const checkOut = splitDateAndTime(unterkunft.checkOut);
          this.elemente.eintragForm.querySelector("#eintrag-startDate").value = checkIn.date;
          this.elemente.eintragForm.querySelector("#eintrag-startTime").value = checkIn.time;
          this.elemente.eintragForm.querySelector("#eintrag-endDate").value = checkOut.date;
          this.elemente.eintragForm.querySelector("#eintrag-endTime").value = checkOut.time;
          this.elemente.eintragForm.querySelector("#eintrag-name").value = unterkunft.name || "";
          this.elemente.eintragForm.querySelector("#eintrag-adresse").value = unterkunft.adresse || "";
          this.elemente.eintragForm.querySelector("#eintrag-kosten").value = unterkunft.preis ?? "";
          this.elemente.eintragForm.querySelector("#eintrag-waehrung").value = unterkunft.waehrung || "EUR";
          this.elemente.eintragForm.querySelector("#eintrag-link").value = unterkunft.link || "";
          this.elemente.eintragForm.querySelector("#eintrag-notizen").value = unterkunft.notizen || "";
          this.bearbeiteEintrag = { typ, id: eintragId };
          this._setEintragTypValue("unterkunft");
          this._aktualisiereEintragTypTabs();
          if (this.elemente.eintragLoeschenBtn) {
            this.elemente.eintragLoeschenBtn.hidden = false;
          }
          this.elemente.eintragForm.querySelector("#eintrag-name")?.focus();
        }
      }

      async _handleTimelineEintragLoeschen(typ, eintragId) {
        if (!this.aktivesProjekt || !eintragId) {
          return;
        }

        if (typ === "aktivitaet") {
          const aktivitaet = await this.storage.getAktivitaet(eintragId);
          if (!aktivitaet || aktivitaet.projektId !== this.aktivesProjekt.id) {
            return;
          }

          const bestaetigt = window.confirm(`Eintrag „${aktivitaet.titel || "Eintrag"}“ wirklich löschen?`);
          if (!bestaetigt) {
            return;
          }

          await this.storage.deleteAktivitaet(eintragId);
          if (this.bearbeiteEintrag?.typ === "aktivitaet" && this.bearbeiteEintrag.id === eintragId) {
            this._beendeEintragBearbeiten();
            this.elemente.eintragForm.reset();
          }
          await this._renderTimeline();
          await this._renderKarteRoute();
          await this._aktualisiereWaehrungsAuswahl();
          await this._renderKostenUebersicht();
          this._setStatus("Eintrag gelöscht.");
          return;
        }

        if (typ === "unterkunft") {
          const unterkunft = await this.storage.getUnterkunft(eintragId);
          if (!unterkunft || unterkunft.projektId !== this.aktivesProjekt.id) {
            return;
          }

          const bestaetigt = window.confirm(`Eintrag „${unterkunft.name || "Eintrag"}“ wirklich löschen?`);
          if (!bestaetigt) {
            return;
          }

          await this.storage.deleteUnterkunft(eintragId);
          if (this.bearbeiteEintrag?.typ === "unterkunft" && this.bearbeiteEintrag.id === eintragId) {
            this._beendeEintragBearbeiten();
            this.elemente.eintragForm.reset();
          }
          await this._renderTimeline();
          await this._renderKarteRoute();
          await this._aktualisiereWaehrungsAuswahl();
          await this._renderKostenUebersicht();
          this._setStatus("Eintrag gelöscht.");
        }
      }

      async _aktualisiereWaehrungsAuswahl() {
        if (!this.aktivesProjekt) {
          return;
        }

        const waehrungen = await this.storage.listProjektWaehrungen(this.aktivesProjekt.id);
        this._setWaehrungsOptionen(this.elemente.eintragWaehrungSelect, waehrungen, "EUR");
        this._setWaehrungsOptionen(this.elemente.ausgabeWaehrungSelect, waehrungen, "EUR");
      }

      _setWaehrungsOptionen(selectElement, waehrungen, fallbackWaehrung = "EUR") {
        if (!selectElement) {
          return;
        }

        const current = normalizeCurrencyCode(selectElement.value) || fallbackWaehrung;
        const allowed = Array.from(new Set((Array.isArray(waehrungen) ? waehrungen : []).map(normalizeCurrencyCode).filter(Boolean)));
        if (!allowed.length) {
          allowed.push("EUR", "USD");
        }

        selectElement.innerHTML = allowed.map((waehrung) => `<option value="${waehrung}">${waehrung}</option>`).join("");
        if (allowed.includes(current)) {
          selectElement.value = current;
          return;
        }

        selectElement.value = allowed.includes(fallbackWaehrung) ? fallbackWaehrung : allowed[0];
      }

      _beendeEintragBearbeiten() {
        this.bearbeiteEintrag = null;
        this._aktualisiereEintragTypTabs();
        if (this.elemente.eintragLoeschenBtn) {
          this.elemente.eintragLoeschenBtn.hidden = true;
        }
      }

      _setStatus(text) {
        void text;
      }

      _setProjektDialogModus(istBearbeiten) {
        this.elemente.projektDialogTitel.textContent = istBearbeiten ? "Reise bearbeiten" : "Neue Reise";
        this.elemente.projektDialogSubmit.textContent = istBearbeiten ? "Änderungen speichern" : "Projekt speichern";
      }

      _setAktiverHauptReiter(reiterName) {
        if (!["timeline", "karte", "kosten", "ablage"].includes(reiterName)) {
          return;
        }

        this.aktiverHauptReiter = reiterName;
        this._aktualisiereHauptReiter();

        if (reiterName === "karte" && this.aktivesProjekt) {
          window.requestAnimationFrame(async () => {
            this.map?.invalidateSize();
            await this._renderKarteRoute();
          });
        }
      }

      _aktualisiereHauptReiter() {
        const hatProjekt = Boolean(this.aktivesProjekt);
        this.elemente.hauptReiter.hidden = !hatProjekt;
        this.elemente.hauptReiter.style.display = hatProjekt ? "" : "none";
        this.elemente.hauptReiter.setAttribute("aria-hidden", String(!hatProjekt));

        const panels = {
          timeline: this.elemente.timelineBereich,
          karte: this.elemente.karteBereich,
          kosten: this.elemente.kostenBereich,
          ablage: this.elemente.ablageBereich,
        };

        Object.entries(panels).forEach(([name, element]) => {
          const sichtbar = hatProjekt && this.aktiverHauptReiter === name;
          element.hidden = !sichtbar;
          element.setAttribute("aria-hidden", String(!sichtbar));
        });

        const reiterButtons = Array.from(this.elemente.hauptReiter.querySelectorAll("button[data-reiter]"));
        reiterButtons.forEach((button) => {
          const aktiv = button.dataset.reiter === this.aktiverHauptReiter;
          button.classList.toggle("aktiv", aktiv);
          button.setAttribute("aria-selected", String(aktiv));
          button.disabled = !hatProjekt;
          button.tabIndex = aktiv && hatProjekt ? 0 : -1;
        });
      }

      _oeffneNeueReiseDialog() {
        this.bearbeiteProjektId = null;
        this._setProjektDialogModus(false);
        this.elemente.projektFormular.reset();
        this.elemente.formularFehler.textContent = "";
        const dialog = this.elemente.neueReiseDialog;

        try {
          if (typeof dialog.showModal === "function") {
            if (!dialog.open) {
              dialog.showModal();
            }
          }
        } catch {
        }

        if (!dialog.open) {
          dialog.setAttribute("open", "");
        }

        if (dialog.open) {
          this._syncDialogBodyState();
        } else {
          this._syncDialogBodyState();
          this._setStatus("Dialog konnte nicht geöffnet werden.");
          return;
        }

        window.requestAnimationFrame(() => {
          this.elemente.projektFormular.querySelector("#titel")?.focus();
        });
      }

      async _oeffneProjektBearbeitenDialog(projektId) {
        const projekt = await this.storage.getProjekt(projektId);
        if (!projekt) {
          return;
        }

        this.bearbeiteProjektId = projekt.id;
        this._setProjektDialogModus(true);
        this.elemente.formularFehler.textContent = "";

        const titelInput = this.elemente.projektFormular.querySelector("#titel");
        if (titelInput) {
          titelInput.value = projekt.titel || "";
        }

        const dialog = this.elemente.neueReiseDialog;

        try {
          if (typeof dialog.showModal === "function") {
            if (!dialog.open) {
              dialog.showModal();
            }
          }
        } catch {
        }

        if (!dialog.open) {
          dialog.setAttribute("open", "");
        }

        if (dialog.open) {
          this._syncDialogBodyState();
        } else {
          this._syncDialogBodyState();
          return;
        }

        window.requestAnimationFrame(() => {
          titelInput?.focus();
          titelInput?.setSelectionRange(titelInput.value.length, titelInput.value.length);
        });
      }

      _schliesseNeueReiseDialog() {
        const dialog = this.elemente.neueReiseDialog;

        if (!dialog.open) {
          dialog.removeAttribute("open");
          this._syncDialogBodyState();
          return;
        }

        try {
          if (typeof dialog.close === "function") {
            dialog.close();
          } else {
            dialog.removeAttribute("open");
          }
        } catch {
          dialog.removeAttribute("open");
        }

        dialog.removeAttribute("open");
        this._setProjektDialogModus(false);
        this.bearbeiteProjektId = null;
        this._syncDialogBodyState();
      }

      _oeffneZeitplanDialog() {
        if (!this.aktivesProjekt) {
          return;
        }

        if (!this.bearbeiteEintrag) {
          this._beendeEintragBearbeiten();
          this.elemente.eintragForm.reset();
          this._setEintragTypValue("aktivitaet");
          this._aktualisiereEintragTypTabs();
        }
        this.elemente.eintragFehler.textContent = "";
        this._oeffneDialog(this.elemente.zeitplanDialog);
      }

      async _fokussiereEintragAufKarte(typ, eintragId) {
        if (!this.aktivesProjekt || !eintragId || !["aktivitaet", "unterkunft"].includes(String(typ || ""))) {
          return;
        }

        let zielEintrag = null;
        if (typ === "aktivitaet") {
          const aktivitaet = await this.storage.getAktivitaet(eintragId);
          if (!aktivitaet || aktivitaet.projektId !== this.aktivesProjekt.id) {
            return;
          }
          if (!hasCoordinates(aktivitaet)) {
            const resolved = await this.storage.resolveKoordinatenFuerProjekt({ aktivitaeten: [aktivitaet] });
            zielEintrag = resolved.aktivitaeten?.[0] || aktivitaet;
          } else {
            zielEintrag = aktivitaet;
          }
        } else {
          const unterkunft = await this.storage.getUnterkunft(eintragId);
          if (!unterkunft || unterkunft.projektId !== this.aktivesProjekt.id) {
            return;
          }
          if (!hasCoordinates(unterkunft)) {
            const resolved = await this.storage.resolveKoordinatenFuerProjekt({ unterkuenfte: [unterkunft] });
            zielEintrag = resolved.unterkuenfte?.[0] || unterkunft;
          } else {
            zielEintrag = unterkunft;
          }
        }

        if (!zielEintrag || !hasCoordinates(zielEintrag)) {
          this.elemente.karteHinweis.textContent = "Für diese Adresse konnten keine Koordinaten ermittelt werden.";
          return;
        }

        this.kartenFokus = {
          lat: Number(zielEintrag.lat),
          lon: Number(zielEintrag.lon),
          zoom: 17,
          bis: Date.now() + 2000,
        };

        this._setAktiverHauptReiter("karte");
        await this._renderKarteRoute();
        const fokussiert = this.map?.focusOn(zielEintrag.lat, zielEintrag.lon, 17);
        if (!fokussiert) {
          this.elemente.karteHinweis.textContent = "Kartenfokus aktuell nicht verfügbar.";
        }
      }

      _schliesseZeitplanDialog() {
        this._schliesseDialog(this.elemente.zeitplanDialog);
      }

      _oeffneKostenDialog() {
        if (!this.aktivesProjekt) {
          return;
        }

        this.elemente.ausgabeFehler.textContent = "";
        this._oeffneDialog(this.elemente.kostenDialog);
      }

      _schliesseKostenDialog() {
        this._schliesseDialog(this.elemente.kostenDialog);
      }

      _oeffneEinstellungenDialog() {
        this._renderDatenbankAnzeige();
        this._oeffneDialog(this.elemente.einstellungenDialog);
      }

      _schliesseEinstellungenDialog() {
        this._schliesseDialog(this.elemente.einstellungenDialog);
      }

      _oeffneDialog(dialog) {
        if (!dialog) {
          return;
        }

        try {
          if (typeof dialog.showModal === "function") {
            if (!dialog.open) {
              dialog.showModal();
            }
          }
        } catch {
        }

        if (!dialog.open) {
          dialog.setAttribute("open", "");
        }
        this._syncDialogBodyState();
      }

      _schliesseDialog(dialog) {
        if (!dialog) {
          return;
        }

        if (!dialog.open) {
          dialog.removeAttribute("open");
          this._syncDialogBodyState();
          return;
        }

        try {
          if (typeof dialog.close === "function") {
            dialog.close();
          } else {
            dialog.removeAttribute("open");
          }
        } catch {
          dialog.removeAttribute("open");
        }

        dialog.removeAttribute("open");
        this._syncDialogBodyState();
      }

      _syncDialogBodyState() {
        const hatOffenenDialog = Boolean(document.querySelector("dialog[open]"));
        document.body.classList.toggle("dialog-offen", hatOffenenDialog);
      }

      _renderDatenbankAnzeige() {
        if (!this.elemente?.datenbankNameAnzeige) {
          return;
        }
        const dbNameText = `IndexedDB: ${DB_NAME} (Schema v${DB_VERSION})`;
        if (this.importierteDatenbankDatei) {
          this.elemente.datenbankNameAnzeige.textContent = `${dbNameText} | Quelle: ${this.importierteDatenbankDatei}`;
          return;
        }
        this.elemente.datenbankNameAnzeige.textContent = dbNameText;
      }

      async _renderAppVersion() {
        if (!this.elemente.appVersionAnzeige) {
          return;
        }
        const version = await leseServiceWorkerVersion();
        this.elemente.appVersionAnzeige.textContent = version ? `Version: ${version}` : "Version: -";
      }

      _setAnzeigemodus(mode, { persist = true } = {}) {
        const resolved = normalizeAnzeigemodus(mode || this.anzeigemodus);
        this.anzeigemodus = resolved;
        document.body.setAttribute("data-theme", resolved === "dunkel" ? "dark" : "light");
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", resolved === "dunkel" ? "#0b1220" : "#155dfc");
        }
        this.elemente.anzeigemodusButtons.forEach((button) => {
          const buttonMode = String(button.dataset.anzeigemodus || "").trim().toLowerCase();
          const aktiv = buttonMode === resolved;
          button.classList.toggle("aktiv", aktiv);
          button.setAttribute("aria-pressed", String(aktiv));
        });

        if (!persist) {
          return;
        }
        try {
          window.localStorage.setItem(ANZEIGEMODUS_STORAGE_KEY, resolved);
        } catch {
        }
      }

    }

    function badgeText(typ) {
      if (typ === "unterkunft") {
        return "Unterkunft";
      }

      return "Aktivität";
    }

    function formatZeitpunkt(typ, eintrag) {
      const startWert = typ === "unterkunft" ? eintrag.checkIn : eintrag.startZeit;
      const endeWert = typ === "unterkunft" ? eintrag.checkOut : eintrag.endZeit;
      const start = startWert ? formatDatumZeit(startWert) : "Keine Startzeit";
      const ende = endeWert ? formatDatumZeit(endeWert) : "Offen";
      return `${start} bis ${ende}`;
    }

    function formatZeitZeilen(typ, eintrag) {
      const startWert = typ === "unterkunft" ? eintrag.checkIn : eintrag.startZeit;
      const endeWert = typ === "unterkunft" ? eintrag.checkOut : eintrag.endZeit;
      return {
        startLabel: "Start",
        start: startWert ? formatDatumZeit(startWert) : "Keine Startzeit",
        endeLabel: "Ende",
        ende: endeWert ? formatDatumZeit(endeWert) : "Offen",
      };
    }

    function formatZeitMarker(typ, eintrag) {
      const value = typ === "unterkunft" ? eintrag.checkIn : eintrag.startZeit;
      if (!value) {
        return "Offen";
      }

      const datum = new Date(value);
      if (Number.isNaN(datum.getTime())) {
        return "Offen";
      }

      return new Intl.DateTimeFormat("de-DE", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).format(datum);
    }

    function formatDatum(value) {
      if (!value) {
        return "-";
      }

      const text = String(value).trim();
      const datum = text.includes("T") ? new Date(text) : new Date(`${text}T00:00:00`);
      if (Number.isNaN(datum.getTime())) {
        return text;
      }

      return new Intl.DateTimeFormat("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
      }).format(datum);
    }

    function formatDatumZeit(value) {
      if (!value) {
        return "-";
      }

      const datum = new Date(value);
      if (Number.isNaN(datum.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      }).format(datum);
    }

    function formatTag(value) {
      if (!value || value === "Ohne Datum") {
        return "Ohne Datum";
      }

      return formatDatum(value);
    }

    function formatBetrag(value, waehrung) {
      const betrag = Number(value || 0);
      const code = /^[A-Z]{3}$/.test(String(waehrung || "").toUpperCase()) ? String(waehrung).toUpperCase() : "EUR";

      try {
        return new Intl.NumberFormat("de-DE", {
          style: "currency",
          currency: code,
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(betrag);
      } catch {
        return `${betrag.toFixed(2)} ${code}`;
      }
    }

    function formatDistanzKm(kilometer) {
      const wert = Number(kilometer || 0);
      return `${new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      }).format(wert)} km`;
    }

    function formatDurationMinutes(minutes) {
      const total = Math.max(0, Number(minutes || 0));
      if (!Number.isFinite(total) || total <= 0) {
        return "-";
      }

      const rounded = Math.round(total);
      const stunden = Math.floor(rounded / 60);
      const minuten = rounded % 60;
      if (stunden <= 0) {
        return `${minuten} min`;
      }
      if (minuten === 0) {
        return `${stunden} h`;
      }
      return `${stunden} h ${minuten} min`;
    }

    function profilLabel(profile) {
      const key = String(profile || "").trim().toLowerCase();
      if (key === "mixed") {
        return "Gemischt";
      }
      if (key === "walking") {
        return "Zu Fuß";
      }
      return "Auto";
    }

    function formatDateigroesse(bytes) {
      const size = Number(bytes || 0);
      if (size < 1024) {
        return `${size} B`;
      }

      if (size < 1024 * 1024) {
        return `${(size / 1024).toFixed(1)} KB`;
      }

      if (size < 1024 * 1024 * 1024) {
        return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      }

      return `${(size / (1024 * 1024 * 1024)).toFixed(1)} GB`;
    }

    function normalizeCurrencyCode(value) {
      const text = String(value || "").trim().toUpperCase();
      return /^[A-Z]{3}$/.test(text) ? text : "";
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === "object" && !Array.isArray(value);
    }

    async function blobToDataUrl(value) {
      if (!(value instanceof Blob)) {
        return "";
      }

      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          resolve(typeof reader.result === "string" ? reader.result : "");
        };
        reader.onerror = () => reject(reader.error || new Error("Datei konnte nicht gelesen werden."));
        reader.readAsDataURL(value);
      });
    }

    async function dataUrlToBlob(value, fallbackType = "application/octet-stream") {
      const text = String(value || "").trim();
      if (!text) {
        return new Blob([], { type: fallbackType });
      }

      try {
        const response = await fetch(text);
        if (response.ok) {
          return await response.blob();
        }
      } catch {
      }

      return new Blob([], { type: fallbackType });
    }


    const PWA_AKTIV = true;

    function initPwa() {
      if (!PWA_AKTIV) {
        return;
      }

      if (!("serviceWorker" in navigator)) {
        return;
      }

      let reloadedOnControllerChange = false;

      const promptAndActivateUpdate = (registration) => {
        const waitingWorker = registration?.waiting;
        if (!waitingWorker) {
          return;
        }

        const confirmUpdate = window.confirm("Neue Version verfügbar – App neu starten");
        if (confirmUpdate) {
          waitingWorker.postMessage("SKIP_WAITING");
        }
      };

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloadedOnControllerChange) {
          return;
        }
        reloadedOnControllerChange = true;
        window.location.reload();
      });

      (async () => {
        try {
          const registration = await navigator.serviceWorker.register("./service-worker.js", {
            scope: "./",
          });

          await registration.update();
          promptAndActivateUpdate(registration);

          registration.addEventListener("updatefound", () => {
            const installingWorker = registration.installing;
            if (!installingWorker) {
              return;
            }

            installingWorker.addEventListener("statechange", () => {
              if (installingWorker.state === "installed") {
                promptAndActivateUpdate(registration);
              }
            });
          });

          console.info("Service Worker registriert.");
        } catch (error) {
          console.warn("Service Worker konnte nicht registriert werden:", error);
        }
      })();
    }



    async function bootstrap() {
      try {
        const leafletReadyPromise = ensureLeafletLoaded();
        preloadMapTilesInBackground();

        const db = new ReiseDB();
        await db.init();

        const storage = new ReiseStorage(db);
        const leafletReady = await leafletReadyPromise;
        if (!leafletReady) {
          console.warn("Leaflet konnte nicht geladen werden. Karte bleibt bis zur erfolgreichen Nachladung deaktiviert.");
        }
        const map = new ReiseMap();
        const ui = new ReiseUI({ storage, map });

        ui.init();
        await ui.renderInitial();

        initPwa();
      } catch (error) {
        console.error("Bootstrap-Fehler:", error);
      }
    }

    bootstrap();
    
    
    
</script>
