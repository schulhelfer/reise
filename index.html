<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#155dfc" />
  <title>Reiseplaner</title>
  <link rel="icon" href="./icon-32x32.png" type="image/png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: light;
      --bg-start: #ecf4ff;
      --bg-end: #f9fafb;
      --surface: #ffffff;
      --surface-2: #f7faff;
      --text: #0f172a;
      --text-muted: #334155;
      --primary: #155dfc;
      --primary-hover: #0d47cf;
      --border: #d8e0f0;
      --danger: #c62828;
      --shadow: 0 18px 40px rgba(14, 30, 70, 0.1);
      --radius: 16px;
      --glass-surface: linear-gradient(155deg, rgba(249, 251, 255, 0.86) 0%, rgba(240, 245, 252, 0.66) 100%);
      --glass-surface-soft: linear-gradient(155deg, rgba(248, 250, 253, 0.78) 0%, rgba(236, 242, 251, 0.58) 100%);
      --glass-stroke: rgba(217, 227, 242, 0.95);
      --glass-shadow: 0 20px 40px rgba(31, 46, 76, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      --glass-input-bg: rgba(245, 248, 254, 0.82);
      --glass-button-bg: linear-gradient(160deg, rgba(56, 111, 204, 0.92), rgba(37, 88, 180, 0.94));
      --glass-button-border: rgba(246, 250, 255, 0.56);
      --glass-muted-bg: rgba(232, 239, 250, 0.76);
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg-start: #090f1e;
      --bg-end: #121a2b;
      --surface: #111827;
      --surface-2: #0f172a;
      --text: #e5e7eb;
      --text-muted: #b5c1d6;
      --border: #2b3b56;
      --shadow: 0 18px 40px rgba(1, 6, 16, 0.52);
      --glass-surface: linear-gradient(155deg, rgba(31, 42, 59, 0.9) 0%, rgba(16, 24, 38, 0.76) 100%);
      --glass-surface-soft: linear-gradient(155deg, rgba(34, 46, 66, 0.82) 0%, rgba(19, 28, 44, 0.68) 100%);
      --glass-stroke: rgba(164, 181, 206, 0.4);
      --glass-shadow: 0 24px 48px rgba(2, 7, 15, 0.66), inset 0 1px 0 rgba(172, 186, 208, 0.2);
      --glass-input-bg: rgba(18, 27, 42, 0.78);
      --glass-button-bg: linear-gradient(160deg, rgba(65, 103, 170, 0.9), rgba(46, 79, 141, 0.92));
      --glass-button-border: rgba(166, 183, 207, 0.42);
      --glass-muted-bg: rgba(39, 53, 74, 0.74);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Avenir Next", "Nunito Sans", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(56rem 36rem at 8% -8%, rgba(133, 169, 223, 0.2), transparent 72%),
        radial-gradient(48rem 30rem at 90% 118%, rgba(141, 165, 194, 0.14), transparent 70%),
        linear-gradient(170deg, var(--bg-start) 0%, var(--bg-end) 45%);
      position: relative;
    }

    .hintergrund-orb {
      position: fixed;
      z-index: -1;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      filter: blur(32px);
      opacity: 0.35;
    }

    .orb-links {
      top: -90px;
      left: -80px;
      background: #b7cbe7;
    }

    .orb-rechts {
      bottom: -120px;
      right: -90px;
      background: #c3d0e3;
    }

    body[data-theme="dark"] .orb-links {
      background: #44628f;
      opacity: 0.24;
    }

    body[data-theme="dark"] .orb-rechts {
      background: #43566f;
      opacity: 0.22;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0));
    }

    body[data-theme="dark"]::after {
      background: linear-gradient(180deg, rgba(148, 163, 184, 0.08), rgba(15, 23, 42, 0));
    }

    .kopfbereich {
      padding: 1.8rem 1rem 0.9rem;
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      gap: 0.9rem;
      align-items: center;
      justify-content: space-between;
      animation: einblenden 450ms ease-out;
    }

    .einstellungen-toggle {
      width: auto;
      margin-top: 0;
      padding: 0.52rem 0.72rem;
      background: linear-gradient(160deg, #1f2937, #111827);
      white-space: nowrap;
      font-size: 1.15rem;
      line-height: 1;
    }

    .ueberzeile {
      margin: 0;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--primary);
    }

    .kopfbereich h1 {
      margin: 0.3rem 0 0;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    .versions-hinweis {
      font-size: 0.58em;
      font-weight: 500;
      color: var(--text-muted);
      vertical-align: middle;
    }

    .unterzeile {
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      max-width: 720px;
    }

    .app-layout {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
    }

    .hauptbereich {
      display: grid;
      gap: 1rem;
      align-content: start;
    }

    .einstellungen-inhalt {
      display: grid;
      gap: 0.9rem;
      max-height: min(74vh, 760px);
      overflow: auto;
    }

    .einstellungen-inhalt .karte {
      animation: none;
    }

    .anzeigemodus-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-top: 0.2rem;
    }

    .anzeigemodus-btn {
      margin-top: 0;
      padding: 0.6rem 0.8rem;
      border: 1px solid #cfdcf8;
      background: #e5e7eb;
      color: #24458f;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: none;
      transform: none;
    }

    .anzeigemodus-btn.aktiv[data-anzeigemodus="hell"] {
      background: linear-gradient(160deg, #0f172a, #1e293b);
      color: #fff;
      border-color: transparent;
    }

    .anzeigemodus-btn.aktiv[data-anzeigemodus="dunkel"] {
      background: linear-gradient(160deg, #334155, #0f172a);
      color: #fff;
      border-color: transparent;
    }

    .karte {
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
      animation: auftauchen 360ms ease-out;
    }

    .karte h2 {
      margin: 0 0 0.85rem;
      font-size: 1.15rem;
    }

    label {
      display: block;
      margin: 0.65rem 0 0.3rem;
      font-size: 0.9rem;
      font-weight: 650;
    }

    input,
    textarea,
    button {
      width: 100%;
      font: inherit;
    }

    input[type="file"] {
      border: 1px dashed #b9c9e8;
      background: #f8fbff;
    }

    input[type="file"].drag-over {
      border-color: #155dfc;
      background: #eaf1ff;
      box-shadow: 0 0 0 3px rgba(21, 93, 252, 0.16);
    }

    input,
    textarea,
    select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.62rem 0.72rem;
      background: var(--surface);
      color: var(--text);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    body[data-theme="dark"] input,
    body[data-theme="dark"] textarea,
    body[data-theme="dark"] select {
      background: #0b1324;
      color: var(--text);
      border-color: #334155;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #97bbff;
      box-shadow: 0 0 0 3px rgba(21, 93, 252, 0.14);
    }

    textarea {
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 12px;
      margin-top: 0.9rem;
      padding: 0.68rem 0.8rem;
      font-weight: 650;
      color: #fff;
      background: linear-gradient(160deg, var(--primary), #0f4cdc);
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .zweispaltig {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .formular-grid {
      display: grid;
    }

    .liste {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.7rem;
    }

    .listen-eintrag {
      border: 1px solid #b7ccff;
      border-radius: 14px;
      background: linear-gradient(180deg, #f3f8ff 0%, #eaf2ff 100%);
      padding: 0.75rem;
      box-shadow: 0 6px 18px rgba(21, 93, 252, 0.1);
    }

    .projekt-kachel {
      cursor: pointer;
    }

    .neue-reise-eintrag {
      display: grid;
      place-items: center;
      min-height: 68px;
      border: 0;
      background: transparent;
      padding: 0.2rem 0;
    }

    .plus-reise-knopf {
      width: 48px;
      height: 48px;
      margin-top: 0;
      border-radius: 999px;
      border: 2px solid #b8cbfb;
      background: #fff;
      color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 0;
      line-height: 0;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(21, 93, 252, 0.18);
      position: relative;
    }

    .plus-reise-knopf::before,
    .plus-reise-knopf::after {
      content: "";
      position: absolute;
      background: var(--primary);
      border-radius: 99px;
    }

    .plus-reise-knopf::before {
      width: 24px;
      height: 4px;
    }

    .plus-reise-knopf::after {
      width: 4px;
      height: 24px;
    }

    .plus-reise-knopf:hover {
      transform: translateY(-1px) scale(1.03);
    }

    .listen-eintrag h3 {
      margin: 0;
      font-size: 1rem;
    }

    .listen-meta {
      margin: 0.35rem 0 0;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .listen-aktionen {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.65rem;
    }

    .listen-aktionen button {
      width: auto;
      margin-top: 0;
      padding: 0.5rem 0.6rem;
      font-size: 0.87rem;
    }

    .listen-aktionen button[data-datei-action="oeffnen"] {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
      min-width: 110px;
      padding: 0.5rem 0.75rem;
    }

    .listen-aktionen button[data-action="bearbeiten"] {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      line-height: 1;
      padding: 0;
    }

    .listen-aktionen button[data-action="drucken"] {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      line-height: 1;
      padding: 0;
    }

    .listen-aktionen button[data-action="loeschen"] {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      line-height: 1;
      padding: 0;
    }

    .listen-eintrag.aktiv-projekt {
      border-color: #2f69ff;
      background: linear-gradient(180deg, #e5efff 0%, #d7e6ff 100%);
      box-shadow: 0 0 0 3px rgba(21, 93, 252, 0.28), 0 14px 30px rgba(21, 93, 252, 0.2);
      transform: translateY(-1px);
    }

    .listen-eintrag.aktiv-projekt h3 {
      color: #0b3bb7;
    }

    .gefahr {
      background: linear-gradient(160deg, var(--danger), #a51c1c);
    }

    .bereich-kopf {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.4rem;
    }

    .bereich-aktionen {
      display: flex;
      gap: 0.5rem;
    }

    .bereich-aktionen button {
      width: auto;
      margin-top: 0;
      padding: 0.55rem 0.7rem;
      white-space: nowrap;
    }

    .meta-text {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .karte-option {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.2;
      user-select: none;
    }

    .karte-option input[type="checkbox"] {
      margin: 0;
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      accent-color: #155dfc;
      vertical-align: middle;
    }

    #karte-bereich .bereich-kopf .karte-option {
      margin: 0;
      margin-left: auto;
    }

    .segment-sprechblase {
      border: 1px solid rgba(51, 65, 85, 0.22);
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.08);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
      color: #334155;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.2;
      padding: 0.24rem 0.5rem;
      white-space: normal;
      text-align: center;
    }

    .segment-sprechblase-zeile {
      display: block;
      white-space: nowrap;
    }

    .segment-sprechblase-driving {
      border-color: rgba(6, 182, 212, 0.42);
      background: rgba(6, 182, 212, 0.1);
      color: #155e75;
      box-shadow: 0 4px 10px rgba(6, 182, 212, 0.12);
    }

    .segment-sprechblase-walking {
      border-color: rgba(22, 163, 74, 0.42);
      background: rgba(22, 163, 74, 0.1);
      color: #166534;
      box-shadow: 0 4px 10px rgba(22, 163, 74, 0.12);
    }

    .reiter-leiste {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .reiter-titel {
      margin: 0;
      padding: 0.65rem 0.9rem;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, #f9fbff 0%, #eef4ff 100%);
      font-size: 1rem;
      white-space: nowrap;
    }

    .reiter-tabs {
      display: flex;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .reiter {
      width: auto;
      margin-top: 0;
      border-radius: 0;
      border-left: 1px solid var(--border);
      padding: 0.62rem 0.85rem;
      background: var(--surface);
      color: #1e3a8a;
      white-space: nowrap;
    }

    .reiter:first-child {
      border-left: 0;
    }

    .reiter.aktiv {
      background: linear-gradient(160deg, var(--primary), #0f4cdc);
      color: #fff;
    }

    .reiter-eintraege {
      background: #ffedd5;
      color: #9a3412;
    }

    .reiter-eintraege.aktiv {
      background: linear-gradient(160deg, #f97316, #ea580c);
      color: #fff;
    }

    .sekundaer {
      background: linear-gradient(160deg, #4b5563, #374151);
    }

    .tab-leiste {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      margin: 0.7rem 0 0.55rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #edf3ff;
    }

    .tab {
      margin: 0;
      border-radius: 0;
      border: 0;
      border-right: 1px solid #cfdcf8;
      padding: 0.6rem 0.8rem;
      background: #e5e7eb;
      color: #24458f;
      font-weight: 700;
      box-shadow: none;
      transform: none;
    }

    .tab:last-child {
      border-right: 0;
    }

    .tab.aktiv {
      background: linear-gradient(160deg, var(--primary), #0f4cdc);
      color: #fff;
    }

    body[data-theme="dark"] .tab-leiste {
      background: #0f172a;
      border-color: #334155;
    }

    body[data-theme="dark"] .tab {
      background: #1e293b;
      color: #bfdbfe;
      border-right-color: #334155;
    }

    .eintrag-form {
      margin-top: 0.4rem;
    }

    .eintrag-termine {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
      gap: 0.75rem;
      margin-bottom: 0.15rem;
    }

    .eintrag-typ-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin: 0.2rem 0 0.75rem;
    }

    .eintrag-typ-btn {
      margin-top: 0;
      padding: 0.6rem 0.8rem;
      border: 1px solid #cfdcf8;
      background: #e5e7eb;
      color: #24458f;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: none;
      transform: none;
    }

    .eintrag-typ-btn.aktiv {
      background: linear-gradient(160deg, var(--primary), #0f4cdc);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(21, 93, 252, 0.2);
    }

    .eintrag-typ-btn[data-eintrag-typ="aktivitaet"].aktiv {
      background: linear-gradient(160deg, #f97316, #ea580c);
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.24);
    }

    .eintrag-typ-btn[data-eintrag-typ="unterkunft"].aktiv {
      background: linear-gradient(160deg, #6d28d9, #5b21b6);
      box-shadow: 0 10px 24px rgba(91, 33, 182, 0.24);
    }

    body[data-theme="dark"] .eintrag-typ-btn {
      background: #1e293b;
      color: #bfdbfe;
      border-color: #334155;
    }

    .eintrag-form button[type="submit"] {
      margin-top: 0.8rem;
      border-radius: 12px;
      padding: 0.7rem 0.85rem;
      background: linear-gradient(160deg, #1e40af, #155dfc);
      box-shadow: 0 10px 24px rgba(21, 93, 252, 0.2);
    }

    #eintrag-form.eintrag-form-aktivitaet button[type="submit"] {
      background: linear-gradient(160deg, #f97316, #ea580c);
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.24);
    }

    #eintrag-form.eintrag-form-unterkunft button[type="submit"] {
      background: linear-gradient(160deg, #6d28d9, #5b21b6);
      box-shadow: 0 10px 24px rgba(91, 33, 182, 0.24);
    }

    .kosten-eingabe {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 84px;
      gap: 0.5rem;
    }

    .waehrung-select {
      text-transform: uppercase;
      font-weight: 700;
      padding: 0.62rem 0.55rem;
    }

    .daten-aktionen {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      justify-content: center;
      margin: 0.35rem 0 0.55rem;
    }

    .daten-aktionen button {
      width: 54px;
      height: 54px;
      margin-top: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      line-height: 1;
    }

    .visuell-versteckt {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .kosten-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .kosten-block {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 0.7rem;
    }

    .kosten-gesamt-block {
      margin-bottom: 0.7rem;
    }

    .kosten-gesamt-zeile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .kosten-gesamt-zeile h3 {
      margin: 0;
      white-space: nowrap;
    }

    .kosten-gesamt-zeile #kosten-gesamt-liste {
      display: flex;
      gap: 0.4rem;
      margin: 0;
    }

    .kosten-zweispaltig {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem;
    }

    .kosten-block h3 {
      margin: 0 0 0.5rem;
      font-size: 0.92rem;
      color: #1e3a8a;
    }

    .kennzahlen-liste {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.4rem;
    }

    .kennzahl-zeile {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.36rem 0.45rem;
      border-radius: 10px;
      background: #f8faff;
    }

    .kennzahl-zeile-wert-only {
      justify-content: flex-end;
      background: transparent;
      padding: 0;
    }

    .kennzahl-label {
      color: var(--text-muted);
      font-size: 0.85rem;

<script>
    const ANZEIGEMODUS_STORAGE_KEY = "reiseplaner-anzeigemodus";
    const DB_NAME = "reiseplaner-db";
    const DB_VERSION = 8;

    const STORE_NAMES = {
      projekte: "projekte",
      stops: "stops",
      eintraege: "eintraege",
      ausgaben: "ausgaben",
      dateien: "dateien",
      links: "links",
      segmentProfiles: "segmentProfiles",
      internetBildCache: "internetBildCache",
      geocodeCache: "geocodeCache",
      currencyCache: "currencyCache",
      fxRates: "fxRates",
    };
    const BACKUP_FORMAT = "reiseplaner-backup";
    const BACKUP_VERSION = 2;
    const BACKUP_STORES = [
      STORE_NAMES.projekte,
      STORE_NAMES.stops,
      STORE_NAMES.eintraege,
      STORE_NAMES.ausgaben,
      STORE_NAMES.dateien,
      STORE_NAMES.links,
      STORE_NAMES.segmentProfiles,
      STORE_NAMES.internetBildCache,
      STORE_NAMES.geocodeCache,
      STORE_NAMES.currencyCache,
      STORE_NAMES.fxRates,
    ];

    function normalizeAnzeigemodus(value) {
      const text = String(value || "").trim().toLowerCase();
      if (text === "dunkel") {
        return "dunkel";
      }
      return "hell";
    }

    function detectSystemAnzeigemodus() {
      if (typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        return "dunkel";
      }
      return "hell";
    }

    function leseGespeichertenAnzeigemodus() {
      try {
        const stored = window.localStorage.getItem(ANZEIGEMODUS_STORAGE_KEY);
        if (!stored) {
          return "hell";
        }
        return normalizeAnzeigemodus(stored);
      } catch {
        return "hell";
      }
    }

    async function leseServiceWorkerVersion() {
      try {
        const response = await fetch("./service-worker.js", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const text = await response.text();
        const match = text.match(/const\s+VERSION\s*=\s*(\d+)\s*;/);
        if (!match) {
          return "";
        }
        return String(match[1] || "").trim();
      } catch {
        return "";
      }
    }

    class ReiseDB {
      constructor() {
        this.db = null;
      }

      async init() {
        if (this.db) {
          return;
        }

        this.db = await new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);

          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            const oldVersion = Number(event.oldVersion || 0);
            const tx = event.target.transaction || null;
            this._erstelleSchema(db, oldVersion, tx);
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      _erstelleSchema(db, oldVersion = 0, tx = null) {
        if (!db.objectStoreNames.contains(STORE_NAMES.projekte)) {
          const store = db.createObjectStore(STORE_NAMES.projekte, { keyPath: "id" });
          store.createIndex("startDatum", "startDatum", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.stops)) {
          const store = db.createObjectStore(STORE_NAMES.stops, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
          store.createIndex("datumZeit", "datumZeit", { unique: false });
          store.createIndex("reihenfolge", "reihenfolge", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.eintraege)) {
          const store = db.createObjectStore(STORE_NAMES.eintraege, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
          store.createIndex("typ", "typ", { unique: false });
          store.createIndex("startZeit", "startZeit", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.ausgaben)) {
          const store = db.createObjectStore(STORE_NAMES.ausgaben, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
          store.createIndex("datum", "datum", { unique: false });
          store.createIndex("kategorie", "kategorie", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.dateien)) {
          const store = db.createObjectStore(STORE_NAMES.dateien, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
          store.createIndex("erstelltAm", "erstelltAm", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.links)) {
          const store = db.createObjectStore(STORE_NAMES.links, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.segmentProfiles)) {
          const store = db.createObjectStore(STORE_NAMES.segmentProfiles, { keyPath: "id" });
          store.createIndex("projektId", "projektId", { unique: false });
          store.createIndex("segmentKey", "segmentKey", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.internetBildCache)) {
          const store = db.createObjectStore(STORE_NAMES.internetBildCache, { keyPath: "query" });
          store.createIndex("updatedAt", "updatedAt", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.geocodeCache)) {
          const store = db.createObjectStore(STORE_NAMES.geocodeCache, { keyPath: "query" });
          store.createIndex("updatedAt", "updatedAt", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.currencyCache)) {
          const store = db.createObjectStore(STORE_NAMES.currencyCache, { keyPath: "countryCode" });
          store.createIndex("updatedAt", "updatedAt", { unique: false });
        }

        if (!db.objectStoreNames.contains(STORE_NAMES.fxRates)) {
          const store = db.createObjectStore(STORE_NAMES.fxRates, { keyPath: "pair" });
          store.createIndex("updatedAt", "updatedAt", { unique: false });
        }

        if (oldVersion > 0 && oldVersion < 6 && tx) {
          this._migrateLegacyEintraege(tx);
        }
      }

      _migrateLegacyEintraege(tx) {
        if (!tx.objectStoreNames.contains(STORE_NAMES.eintraege)) {
          return;
        }

        const eintragStore = tx.objectStore(STORE_NAMES.eintraege);

        const migrateFromStore = (storeName, mapper) => {
          if (!tx.objectStoreNames.contains(storeName)) {
            return;
          }

          const request = tx.objectStore(storeName).getAll();
          request.onsuccess = () => {
            const eintraege = Array.isArray(request.result) ? request.result : [];
            for (const eintrag of eintraege) {
              const normalized = mapper(eintrag);
              if (!normalized || !normalized.id || !normalized.projektId || !normalized.typ) {
                continue;
              }
              eintragStore.put(normalized);
            }
            tx.objectStore(storeName).clear();
          };
        };

        migrateFromStore("unterkuenfte", (unterkunft) => this._legacyUnterkunftToEintrag(unterkunft));
        migrateFromStore("aktivitaeten", (aktivitaet) => this._legacyAktivitaetToEintrag(aktivitaet));
      }

      _legacyUnterkunftToEintrag(unterkunft) {
        if (!unterkunft || typeof unterkunft !== "object") {
          return null;
        }

        return {
          id: unterkunft.id,
          projektId: unterkunft.projektId,
          typ: "unterkunft",
          startZeit: unterkunft.checkIn || "",
          endZeit: unterkunft.checkOut || "",
          titel: String(unterkunft.name || "").trim(),
          adresse: String(unterkunft.adresse || "").trim(),
          lat: toNumberOrNull(unterkunft.lat),
          lon: toNumberOrNull(unterkunft.lon),
          kosten: toNumberOrNull(unterkunft.preis),
          waehrung: normalizeWaehrung(unterkunft.waehrung),
          notizen: String(unterkunft.notizen || "").trim(),
          link: String(unterkunft.link || "").trim(),
          countryCode: String(unterkunft.countryCode || "").toUpperCase(),
        };
      }

      _legacyAktivitaetToEintrag(aktivitaet) {
        if (!aktivitaet || typeof aktivitaet !== "object") {
          return null;
        }

        return {
          id: aktivitaet.id,
          projektId: aktivitaet.projektId,
          typ: "aktivitaet",
          startZeit: aktivitaet.startZeit || "",
          endZeit: aktivitaet.endZeit || "",
          titel: String(aktivitaet.titel || "").trim(),
          adresse: String(aktivitaet.ort || "").trim(),
          lat: toNumberOrNull(aktivitaet.lat),
          lon: toNumberOrNull(aktivitaet.lon),
          kosten: toNumberOrNull(aktivitaet.kosten),
          waehrung: normalizeWaehrung(aktivitaet.waehrung),
          notizen: String(aktivitaet.notizen || "").trim(),
          link: String(aktivitaet.link || "").trim(),
          countryCode: String(aktivitaet.countryCode || "").toUpperCase(),
        };
      }

      _store(storeName, mode = "readonly") {
        if (!this.db) {
          throw new Error("Datenbank ist nicht initialisiert.");
        }

        return this.db.transaction(storeName, mode).objectStore(storeName);
      }

      _toPromise(request) {
        return new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async add(storeName, value) {
        return this._toPromise(this._store(storeName, "readwrite").add(value));
      }

      async put(storeName, value) {
        return this._toPromise(this._store(storeName, "readwrite").put(value));
      }

      async get(storeName, id) {
        return this._toPromise(this._store(storeName).get(id));
      }

      async getAll(storeName) {
        return this._toPromise(this._store(storeName).getAll());
      }

      async delete(storeName, id) {
        return this._toPromise(this._store(storeName, "readwrite").delete(id));
      }

      async clear(storeName) {
        return this._toPromise(this._store(storeName, "readwrite").clear());
      }

      async getAllByIndex(storeName, indexName, key) {
        const index = this._store(storeName).index(indexName);
        return this._toPromise(index.getAll(IDBKeyRange.only(key)));
      }

      async deleteByProjektId(storeName, projektId) {
        const eintraege = await this.getAllByIndex(storeName, "projektId", projektId);
        await Promise.all(eintraege.map((eintrag) => this.delete(storeName, eintrag.id)));
        return eintraege.length;
      }
    }



    const PROJEKT_ABHAENGIGE_STORES = [
      STORE_NAMES.stops,
      STORE_NAMES.eintraege,
      STORE_NAMES.ausgaben,
      STORE_NAMES.dateien,
      STORE_NAMES.links,
      STORE_NAMES.segmentProfiles,
    ];
    const GEOCODE_CACHE_TTL_MS = 1000 * 60 * 60 * 24 * 90;
    const GEOCODE_FAIL_CACHE_TTL_MS = 1000 * 60 * 2;
    const CURRENCY_CACHE_TTL_MS = 1000 * 60 * 60 * 24 * 365;
    const FX_CACHE_TTL_MS = 1000 * 60 * 60 * 6;
    const INTERNET_BILD_CACHE_TTL_MS = 1000 * 60 * 60 * 24 * 30;
    const WIKIPEDIA_BILD_LANGS = [
      "de",
      "en",
      "es",
      "it",
      "fr",
      "nl",
      "pt",
    ];
    const PHOTON_URL = "https://photon.komoot.io/api/";
    const NOMINATIM_URL = "https://nominatim.openstreetmap.org/search";
    const RESTCOUNTRIES_URL = "https://restcountries.com/v3.1/alpha/";
    const FX_API_URL = "https://api.frankfurter.app/latest";

    function neueId() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    class ReiseStorage {
      constructor(db) {
        this.db = db;
        this.geocodeInFlight = new Map();
        this.geocodeChain = Promise.resolve();
      }

      async exportJsonBackup() {
        const stores = {};

        for (const storeName of BACKUP_STORES) {
          const eintraege = await this.db.getAll(storeName);
          if (storeName === STORE_NAMES.dateien) {
            stores[storeName] = await Promise.all(
              eintraege.map(async (dateiEintrag) => {
                const { blob, ...rest } = dateiEintrag || {};
                return {
                  ...rest,
                  blobDataUrl: await blobToDataUrl(blob),
                };
              }),
            );
            continue;
          }

          stores[storeName] = eintraege;
        }

        return {
          format: BACKUP_FORMAT,
          version: BACKUP_VERSION,
          exportedAt: new Date().toISOString(),
          stores,
        };
      }

      async importJsonBackup(payload) {
        const backup = this._normalizeBackupPayload(payload);
        const importedCounts = {};

        for (const storeName of BACKUP_STORES) {
          await this.db.clear(storeName);
        }

        for (const storeName of BACKUP_STORES) {
          const eintraege = Array.isArray(backup.stores[storeName]) ? backup.stores[storeName] : [];
          let count = 0;

          for (const eintrag of eintraege) {
            if (!isPlainObject(eintrag)) {
              continue;
            }

            let value = eintrag;

            if (storeName === STORE_NAMES.dateien) {
              const { blobDataUrl, ...rest } = eintrag || {};
              value = {
                ...rest,
                blob: await dataUrlToBlob(blobDataUrl, rest?.typ || "application/octet-stream"),
              };
            }
            if (storeName === STORE_NAMES.eintraege) {
              value = this._sanitizeEintragRecord(eintrag);
              if (!value) {
                continue;
              }
            }

            await this.db.put(storeName, value);
            count += 1;
          }

          importedCounts[storeName] = count;
        }

        return importedCounts;
      }

      _normalizeBackupPayload(payload) {
        if (!isPlainObject(payload)) {
          throw new Error("Ungültige Datenbank-Datei.");
        }

        if (payload.format !== BACKUP_FORMAT) {
          throw new Error("Unbekanntes Datenformat.");
        }

        const version = Number(payload.version);
        if (!Number.isFinite(version) || ![1, BACKUP_VERSION].includes(version)) {
          throw new Error("Nicht unterstützte Daten-Version.");
        }

        if (!isPlainObject(payload.stores)) {
          throw new Error("Datendatei ist unvollständig.");
        }

        if (version === BACKUP_VERSION) {
          const normalizedStores = {};
          for (const storeName of BACKUP_STORES) {
            normalizedStores[storeName] = Array.isArray(payload.stores[storeName]) ? payload.stores[storeName] : [];
          }
          return {
            ...payload,
            version: BACKUP_VERSION,
            stores: normalizedStores,
          };
        }

        const legacyStores = payload.stores;
        const unterkuenfte = Array.isArray(legacyStores.unterkuenfte) ? legacyStores.unterkuenfte : [];
        const aktivitaeten = Array.isArray(legacyStores.aktivitaeten) ? legacyStores.aktivitaeten : [];
        const eintraege = [
          ...unterkuenfte.map((unterkunft) => this._normalizeLegacyUnterkunftForEintrag(unterkunft)).filter(Boolean),
          ...aktivitaeten.map((aktivitaet) => this._normalizeLegacyAktivitaetForEintrag(aktivitaet)).filter(Boolean),
        ];

        return {
          format: BACKUP_FORMAT,
          version: BACKUP_VERSION,
          stores: {
            projekte: Array.isArray(legacyStores.projekte) ? legacyStores.projekte : [],
            stops: Array.isArray(legacyStores.stops) ? legacyStores.stops : [],
            eintraege,
            ausgaben: Array.isArray(legacyStores.ausgaben) ? legacyStores.ausgaben : [],
            dateien: Array.isArray(legacyStores.dateien) ? legacyStores.dateien : [],
            links: Array.isArray(legacyStores.links) ? legacyStores.links : [],
            geocodeCache: Array.isArray(legacyStores.geocodeCache) ? legacyStores.geocodeCache : [],
            currencyCache: Array.isArray(legacyStores.currencyCache) ? legacyStores.currencyCache : [],
            fxRates: Array.isArray(legacyStores.fxRates) ? legacyStores.fxRates : [],
          },
        };
      }

      _normalizeLegacyUnterkunftForEintrag(unterkunft) {
        if (!isPlainObject(unterkunft)) {
          return null;
        }

        return {
          id: unterkunft.id || neueId(),
          projektId: String(unterkunft.projektId || "").trim(),
          typ: "unterkunft",
          startZeit: String(unterkunft.checkIn || ""),
          endZeit: String(unterkunft.checkOut || ""),
          titel: String(unterkunft.name || "").trim(),
          adresse: String(unterkunft.adresse || "").trim(),
          lat: toNumberOrNull(unterkunft.lat),
          lon: toNumberOrNull(unterkunft.lon),
          kosten: toNumberOrNull(unterkunft.preis),
          waehrung: normalizeWaehrung(unterkunft.waehrung),
          notizen: String(unterkunft.notizen || "").trim(),
          link: String(unterkunft.link || "").trim(),
          countryCode: String(unterkunft.countryCode || "").toUpperCase(),
        };
      }

      _normalizeLegacyAktivitaetForEintrag(aktivitaet) {
        if (!isPlainObject(aktivitaet)) {
          return null;
        }

        return {
          id: aktivitaet.id || neueId(),
          projektId: String(aktivitaet.projektId || "").trim(),
          typ: "aktivitaet",
          startZeit: String(aktivitaet.startZeit || ""),
          endZeit: String(aktivitaet.endZeit || ""),
          titel: String(aktivitaet.titel || "").trim(),
          adresse: String(aktivitaet.ort || "").trim(),
          lat: toNumberOrNull(aktivitaet.lat),
          lon: toNumberOrNull(aktivitaet.lon),
          kosten: toNumberOrNull(aktivitaet.kosten),
          waehrung: normalizeWaehrung(aktivitaet.waehrung),
          notizen: String(aktivitaet.notizen || "").trim(),
          link: String(aktivitaet.link || "").trim(),
          countryCode: String(aktivitaet.countryCode || "").toUpperCase(),
        };
      }

      _sanitizeEintragRecord(eintrag) {
        if (!isPlainObject(eintrag)) {
          return null;
        }

        const typ = String(eintrag.typ || "").trim().toLowerCase();
        if (!["aktivitaet", "unterkunft"].includes(typ)) {
          return null;
        }

        const projektId = String(eintrag.projektId || "").trim();
        if (!projektId) {
          return null;
        }

        return {
          id: eintrag.id || neueId(),
          projektId,
          typ,
          startZeit: String(eintrag.startZeit || ""),
          endZeit: String(eintrag.endZeit || ""),
          titel: String(eintrag.titel || "").trim(),
          adresse: String(eintrag.adresse || "").trim(),
          lat: toNumberOrNull(eintrag.lat),
          lon: toNumberOrNull(eintrag.lon),
          kosten: toNumberOrNull(eintrag.kosten),
          waehrung: normalizeWaehrung(eintrag.waehrung),
          notizen: String(eintrag.notizen || "").trim(),
          link: String(eintrag.link || "").trim(),
          countryCode: String(eintrag.countryCode || "").toUpperCase(),
        };
      }

      async listProjekte() {
        const projekte = await this.db.getAll(STORE_NAMES.projekte);

        return projekte.sort((a, b) => String(a.titel || "").localeCompare(String(b.titel || ""), "de"));
      }

      async getProjekt(projektId) {
        return this.db.get(STORE_NAMES.projekte, projektId);
      }

      async createProjekt({ titel, notizen }) {
        const bereinigterTitel = (titel || "").trim();

        if (!bereinigterTitel) {
          throw new Error("Der Titel ist erforderlich.");
        }

        const projekt = {
          id: neueId(),
          titel: bereinigterTitel,
          notizen: (notizen || "").trim(),
        };

        await this.db.add(STORE_NAMES.projekte, projekt);
        return projekt;
      }

      async updateProjekt(projektId, { titel }) {
        if (!projektId) {
          throw new Error("Projekt fehlt.");
        }

        const bestehendesProjekt = await this.getProjekt(projektId);
        if (!bestehendesProjekt) {
          throw new Error("Projekt nicht gefunden.");
        }

        const bereinigterTitel = (titel || "").trim();

        if (!bereinigterTitel) {
          throw new Error("Der Titel ist erforderlich.");
        }

        const aktualisiertesProjekt = {
          ...bestehendesProjekt,
          titel: bereinigterTitel,
        };

        await this.db.put(STORE_NAMES.projekte, aktualisiertesProjekt);
        return aktualisiertesProjekt;
      }

      async deleteProjekt(projektId) {
        if (!projektId) {
          return;
        }

        for (const storeName of PROJEKT_ABHAENGIGE_STORES) {
          await this.db.deleteByProjektId(storeName, projektId);
        }

        await this.db.delete(STORE_NAMES.projekte, projektId);
      }

      async listStopsByProjekt(projektId) {
        const stops = await this.db.getAllByIndex(STORE_NAMES.stops, "projektId", projektId);
        return stops.sort((a, b) => {
          const aOrder = Number(a.reihenfolge || 0);
          const bOrder = Number(b.reihenfolge || 0);
          if (aOrder !== bOrder) {
            return aOrder - bOrder;
          }
          return (a.datumZeit || "").localeCompare(b.datumZeit || "");
        });
      }

      async listUnterkuenfteByProjekt(projektId) {
        const eintraege = await this._listEintraegeByProjektUndTyp(projektId, "unterkunft");
        return eintraege.map((eintrag) => this._toUnterkunftView(eintrag));
      }

      async listAktivitaetenByProjekt(projektId) {
        const eintraege = await this._listEintraegeByProjektUndTyp(projektId, "aktivitaet");
        return eintraege.map((eintrag) => this._toAktivitaetView(eintrag));
      }

      async _listEintraegeByProjektUndTyp(projektId, typ) {
        const normalizedTyp = this._normalizeEintragTyp(typ);
        if (!normalizedTyp || !projektId) {
          return [];
        }

        const eintraege = await this.db.getAllByIndex(STORE_NAMES.eintraege, "projektId", projektId);
        return eintraege
          .filter((eintrag) => this._normalizeEintragTyp(eintrag?.typ) === normalizedTyp)
          .sort((a, b) => String(a.startZeit || "").localeCompare(String(b.startZeit || "")));
      }

      _normalizeEintragTyp(typ) {
        const normalizedTyp = String(typ || "").trim().toLowerCase();
        return ["aktivitaet", "unterkunft"].includes(normalizedTyp) ? normalizedTyp : "";
      }

      _toEintragRecord({
        id,
        projektId,
        typ,
        startZeit,
        endZeit,
        titel,
        adresse,
        lat,
        lon,
        kosten,
        waehrung,
        notizen,
        link,
        countryCode,
      }) {
        return {
          id: id || neueId(),
          projektId: String(projektId || "").trim(),
          typ: this._normalizeEintragTyp(typ),
          startZeit: startZeit || "",
          endZeit: endZeit || "",
          titel: String(titel || "").trim(),
          adresse: String(adresse || "").trim(),
          lat: toNumberOrNull(lat),
          lon: toNumberOrNull(lon),
          kosten: toNumberOrNull(kosten),
          waehrung: normalizeWaehrung(waehrung),
          notizen: String(notizen || "").trim(),
          link: String(link || "").trim(),
          countryCode: String(countryCode || "").toUpperCase(),
        };
      }

      _toUnterkunftView(eintrag) {
        if (!eintrag) {
          return null;
        }

        return {
          id: eintrag.id,
          projektId: eintrag.projektId,
          checkIn: eintrag.startZeit || "",
          checkOut: eintrag.endZeit || "",
          name: eintrag.titel || "",
          adresse: eintrag.adresse || "",
          lat: toNumberOrNull(eintrag.lat),
          lon: toNumberOrNull(eintrag.lon),
          preis: toNumberOrNull(eintrag.kosten),
          waehrung: normalizeWaehrung(eintrag.waehrung),
          notizen: eintrag.notizen || "",
          link: eintrag.link || "",
          countryCode: String(eintrag.countryCode || "").toUpperCase(),
        };
      }

      _toAktivitaetView(eintrag) {
        if (!eintrag) {
          return null;
        }

        return {
          id: eintrag.id,
          projektId: eintrag.projektId,
          startZeit: eintrag.startZeit || "",
          endZeit: eintrag.endZeit || "",
          titel: eintrag.titel || "",
          ort: eintrag.adresse || "",
          lat: toNumberOrNull(eintrag.lat),
          lon: toNumberOrNull(eintrag.lon),
          kosten: toNumberOrNull(eintrag.kosten),
          waehrung: normalizeWaehrung(eintrag.waehrung),
          notizen: eintrag.notizen || "",
          link: eintrag.link || "",
          countryCode: String(eintrag.countryCode || "").toUpperCase(),
        };
      }

      async _getEintragByTypAndId(eintragId, typ) {
        const normalizedTyp = this._normalizeEintragTyp(typ);
        if (!eintragId || !normalizedTyp) {
          return null;
        }

        const eintrag = await this.db.get(STORE_NAMES.eintraege, eintragId);
        if (!eintrag || this._normalizeEintragTyp(eintrag.typ) !== normalizedTyp) {
          return null;
        }

        return eintrag;
      }

      async listProjektWaehrungen(projektId) {
        const [unterkuenfte, aktivitaeten, ausgaben] = await Promise.all([
          this.listUnterkuenfteByProjekt(projektId),
          this.listAktivitaetenByProjekt(projektId),
          this.listAusgabenByProjekt(projektId),
        ]);

        const waehrungen = new Set(["EUR", "USD"]);
        const countryCodes = new Set();

        for (const unterkunft of unterkuenfte) {
          if (unterkunft.waehrung) {
            waehrungen.add(normalizeWaehrung(unterkunft.waehrung));
          }
          if (unterkunft.countryCode) {
            countryCodes.add(String(unterkunft.countryCode).toUpperCase());
          }
        }

        for (const aktivitaet of aktivitaeten) {
          if (aktivitaet.waehrung) {
            waehrungen.add(normalizeWaehrung(aktivitaet.waehrung));
          }
          if (aktivitaet.countryCode) {
            countryCodes.add(String(aktivitaet.countryCode).toUpperCase());
          }
        }

        for (const ausgabe of ausgaben) {
          if (ausgabe.waehrung) {
            waehrungen.add(normalizeWaehrung(ausgabe.waehrung));
          }
        }

        for (const countryCode of countryCodes) {
          const lokaleWaehrungen = await this._getCurrenciesForCountry(countryCode);
          for (const waehrung of lokaleWaehrungen) {
            waehrungen.add(normalizeWaehrung(waehrung));
          }
        }

        const prioritaet = ["EUR", "USD"];
        return Array.from(waehrungen).sort((a, b) => {
          const indexA = prioritaet.indexOf(a);
          const indexB = prioritaet.indexOf(b);
          if (indexA >= 0 && indexB >= 0) {
            return indexA - indexB;
          }
          if (indexA >= 0) {
            return -1;
          }
          if (indexB >= 0) {
            return 1;
          }
          return a.localeCompare(b);
        });
      }

      async resolveKoordinatenFuerProjekt({ stops = [], unterkuenfte = [], aktivitaeten = [] }) {
        const aufgeloesteStops = [];
        for (const stop of stops) {
          aufgeloesteStops.push(await this._resolveStopKoordinaten(stop));
        }

        const aufgeloesteUnterkuenfte = [];
        for (const unterkunft of unterkuenfte) {
          aufgeloesteUnterkuenfte.push(await this._resolveUnterkunftKoordinaten(unterkunft));
        }

        const aufgeloesteAktivitaeten = [];
        for (const aktivitaet of aktivitaeten) {
          aufgeloesteAktivitaeten.push(await this._resolveAktivitaetKoordinaten(aktivitaet));
        }

        return {
          stops: aufgeloesteStops,
          unterkuenfte: aufgeloesteUnterkuenfte,
          aktivitaeten: aufgeloesteAktivitaeten,
        };
      }

      async createStop({ projektId, datumZeit, titel, adresse, lat, lon, notizen }) {
        const bereinigterTitel = (titel || "").trim();
        if (!projektId) {
          throw new Error("Projekt fehlt.");
        }
        if (!bereinigterTitel) {
          throw new Error("Stop-Titel ist erforderlich.");
        }

        const stops = await this.listStopsByProjekt(projektId);
        const stop = {
          id: neueId(),
          projektId,
          datumZeit: datumZeit || "",
          titel: bereinigterTitel,
          adresse: (adresse || "").trim(),
          lat: toNumberOrNull(lat),
          lon: toNumberOrNull(lon),
          reihenfolge: stops.length + 1,
          notizen: (notizen || "").trim(),
        };

        await this.db.add(STORE_NAMES.stops, stop);
        return stop;
      }

      async getStop(stopId) {
        return this.db.get(STORE_NAMES.stops, stopId);
      }

      async updateStop(stopId, { projektId, datumZeit, titel, adresse, lat, lon, notizen }) {
        if (!stopId) {
          throw new Error("Stop fehlt.");
        }

        const bestehenderStop = await this.getStop(stopId);
        if (!bestehenderStop) {
          throw new Error("Stop nicht gefunden.");
        }

        const bereinigterTitel = (titel || "").trim();
        if (!bereinigterTitel) {
          throw new Error("Stop-Titel ist erforderlich.");
        }

        const stop = {
          ...bestehenderStop,
          projektId: projektId || bestehenderStop.projektId,
          datumZeit: datumZeit || "",
          titel: bereinigterTitel,
          adresse: (adresse || "").trim(),
          lat: toNumberOrNull(lat),
          lon: toNumberOrNull(lon),
          notizen: (notizen || "").trim(),
        };

        await this.db.put(STORE_NAMES.stops, stop);
        return stop;
      }

      async _resolveStopKoordinaten(stop) {
        if (!stop || hasCoordinates(stop) || !normalizeAddress(stop.adresse)) {
          return stop;
        }

        const result = await this._geocodeAddress(stop.adresse);
        if (!result) {
          return stop;
        }

        const aktualisierterStop = {
          ...stop,
          lat: result.lat,
          lon: result.lon,
          countryCode: result.countryCode || stop.countryCode || "",
        };
        await this.db.put(STORE_NAMES.stops, aktualisierterStop);
        return aktualisierterStop;
      }

      async createUnterkunft({ projektId, checkIn, checkOut, name, adresse, lat, lon, preis, waehrung, notizen, link }) {
        const bereinigterName = (name || "").trim();
        if (!projektId) {
          throw new Error("Projekt fehlt.");
        }
        if (!bereinigterName) {
          throw new Error("Titel ist erforderlich.");
        }

        const eintrag = this._toEintragRecord({
          id: neueId(),
          projektId,
          typ: "unterkunft",
          startZeit: checkIn || "",
          endZeit: checkOut || "",
          titel: bereinigterName,
          adresse,
          lat,
          lon,
          kosten: preis,
          waehrung,
          notizen,
          link,
        });

        await this.db.add(STORE_NAMES.eintraege, eintrag);
        return this._toUnterkunftView(eintrag);
      }

      async getUnterkunft(unterkunftId) {
        const eintrag = await this._getEintragByTypAndId(unterkunftId, "unterkunft");
        return this._toUnterkunftView(eintrag);
      }

      async updateUnterkunft(unterkunftId, { projektId, checkIn, checkOut, name, adresse, lat, lon, preis, waehrung, notizen, link }) {
        if (!unterkunftId) {
          throw new Error("Unterkunft fehlt.");
        }

        const bestehenderEintrag = await this.db.get(STORE_NAMES.eintraege, unterkunftId);
        if (!bestehenderEintrag) {
          throw new Error("Unterkunft nicht gefunden.");
        }

        const bereinigterName = (name || "").trim();
        if (!bereinigterName) {
          throw new Error("Titel ist erforderlich.");
        }

        const eintrag = this._toEintragRecord({
          ...bestehenderEintrag,
          projektId: projektId || bestehenderEintrag.projektId,
          typ: "unterkunft",
          startZeit: checkIn || "",
          endZeit: checkOut || "",
          titel: bereinigterName,
          adresse,
          lat,
          lon,
          kosten: preis,
          waehrung,
          notizen,
          link,
          countryCode: bestehenderEintrag.countryCode || "",
        });

        await this.db.put(STORE_NAMES.eintraege, eintrag);
        return this._toUnterkunftView(eintrag);
      }

      async deleteUnterkunft(unterkunftId) {
        if (!unterkunftId) {
          return;
        }

        await this.db.delete(STORE_NAMES.eintraege, unterkunftId);
      }

      async _resolveUnterkunftKoordinaten(unterkunft) {
        if (!unterkunft || hasCoordinates(unterkunft) || !normalizeAddress(unterkunft.adresse)) {
          return unterkunft;
        }

        const result = await this._geocodeAddress(unterkunft.adresse);
        if (!result) {
          return unterkunft;
        }

        const eintrag = await this._getEintragByTypAndId(unterkunft.id, "unterkunft");
        if (!eintrag) {
          return {
            ...unterkunft,
            lat: result.lat,
            lon: result.lon,
            countryCode: result.countryCode || unterkunft.countryCode || "",
          };
        }

        const aktualisierterEintrag = {
          ...eintrag,
          lat: result.lat,
          lon: result.lon,
          countryCode: result.countryCode || eintrag.countryCode || "",
        };
        await this.db.put(STORE_NAMES.eintraege, aktualisierterEintrag);
        return this._toUnterkunftView(aktualisierterEintrag);
      }

      async createAktivitaet({ projektId, startZeit, endZeit, titel, ort, lat, lon, kosten, waehrung, notizen, link }) {
        const bereinigterTitel = (titel || "").trim();
        if (!projektId) {
          throw new Error("Projekt fehlt.");
        }
        if (!bereinigterTitel) {

      async getKostenStatistiken(projektId) {
        const [ausgaben, unterkuenfte, aktivitaeten] = await Promise.all([
          this.listAusgabenByProjekt(projektId),
          this.listUnterkuenfteByProjekt(projektId),
          this.listAktivitaetenByProjekt(projektId),
        ]);
        const gruppenMap = new Map();
        let kostenPostenAnzahl = 0;

        const addKostenposten = ({ betrag, waehrung, kategorie, tag }) => {
          const betragZahl = toNumberOrNull(betrag);
          if (betragZahl === null || betragZahl <= 0) {
            return;
          }

          const waehrungCode = normalizeWaehrung(waehrung);
          if (!gruppenMap.has(waehrungCode)) {
            gruppenMap.set(waehrungCode, {
              waehrung: waehrungCode,
              gesamt: 0,
              proKategorie: new Map(),
              proTag: new Map(),
            });
          }

          const gruppe = gruppenMap.get(waehrungCode);
          gruppe.gesamt += betragZahl;

          const kategorieName = (kategorie || "Sonstiges").trim() || "Sonstiges";
          gruppe.proKategorie.set(kategorieName, (gruppe.proKategorie.get(kategorieName) || 0) + betragZahl);

          const tagName = normalizeKostenTag(tag);
          gruppe.proTag.set(tagName, (gruppe.proTag.get(tagName) || 0) + betragZahl);
          kostenPostenAnzahl += 1;
        };

        for (const ausgabe of ausgaben) {
          addKostenposten({
            betrag: ausgabe.betrag,
            waehrung: ausgabe.waehrung,
            kategorie: ausgabe.kategorie || "Sonstiges",
            tag: ausgabe.datum || "Ohne Datum",
          });
        }

        for (const unterkunft of unterkuenfte) {
          addKostenposten({
            betrag: unterkunft.preis,
            waehrung: unterkunft.waehrung || "EUR",
            kategorie: "Unterkunft",
            tag: unterkunft.checkIn || "Ohne Datum",
          });
        }

        for (const aktivitaet of aktivitaeten) {
          addKostenposten({
            betrag: aktivitaet.kosten,
            waehrung: aktivitaet.waehrung || "EUR",
            kategorie: "Aktivität",
            tag: aktivitaet.startZeit || "Ohne Datum",
          });
        }

        const gruppen = Array.from(gruppenMap.values()).map((gruppe) => ({
          waehrung: gruppe.waehrung,
          gesamt: roundMoney(gruppe.gesamt),
          proKategorie: Array.from(gruppe.proKategorie.entries())
            .map(([name, summe]) => ({ name, summe: roundMoney(summe) }))
            .sort((a, b) => b.summe - a.summe),
          proTag: Array.from(gruppe.proTag.entries())
            .map(([tag, summe]) => ({ tag, summe: roundMoney(summe) }))
            .sort((a, b) => a.tag.localeCompare(b.tag)),
        }));

        gruppen.sort((a, b) => a.waehrung.localeCompare(b.waehrung));

        let gesamtEur = 0;
        let hatUmrechnungsfehler = false;
        const rateCache = new Map();
        const proKategorieGesamtMap = new Map();
        const proTagGesamtMap = new Map();

        const addConverted = (targetMap, key, value, rate) => {
          targetMap.set(key, (targetMap.get(key) || 0) + value * rate);
        };

        for (const gruppe of gruppen) {
          let rate = rateCache.get(gruppe.waehrung);
          if (rate === undefined) {
            rate = await this._getRateToEur(gruppe.waehrung);
            rateCache.set(gruppe.waehrung, rate);
          }
          if (rate === null) {
            hatUmrechnungsfehler = true;
            continue;
          }
          gesamtEur += gruppe.gesamt * rate;
          for (const eintrag of gruppe.proKategorie) {
            addConverted(proKategorieGesamtMap, eintrag.name, eintrag.summe, rate);
          }
          for (const eintrag of gruppe.proTag) {
            addConverted(proTagGesamtMap, eintrag.tag, eintrag.summe, rate);
          }
        }

        const proKategorieGesamt = Array.from(proKategorieGesamtMap.entries())
          .map(([name, summe]) => ({ name, summe: roundMoney(summe) }))
          .sort((a, b) => b.summe - a.summe);

        const proTagGesamt = Array.from(proTagGesamtMap.entries())
          .map(([tag, summe]) => ({ tag, summe: roundMoney(summe) }))
          .sort((a, b) => a.tag.localeCompare(b.tag));

        return {
          ausgaben,
          gruppen,
          anzahl: kostenPostenAnzahl,
          gesamtEur: roundMoney(gesamtEur),
          proKategorieGesamt,
          proTagGesamt,
          hatUmrechnungsfehler,
        };
      }
